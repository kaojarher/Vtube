<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VTuber 訪談系統</title>
    <script src="https://js.puter.com/v2/"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #6366f1;
            --secondary-color: #ec4899;
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --danger-color: #ef4444;
            --bg-color: #0f172a;
            --card-color: #1e293b;
            --border-color: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --radius: 8px;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.6;
        }

        .container {
            display: flex;
            height: 100vh;
            flex-direction: column;
        }

        /* 頂部導航 */
        .header {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            padding: 1rem 2rem;
            box-shadow: var(--shadow);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .header-actions {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        /* 主容器 */
        .main-content {
            display: flex;
            flex: 1;
            overflow: hidden;
            gap: 1rem;
            padding: 1rem;
        }

        /* 側邊欄 */
        .sidebar {
            width: 300px;
            background-color: var(--card-color);
            border-radius: var(--radius);
            padding: 1.5rem;
            overflow-y: auto;
            box-shadow: var(--shadow);
        }

        .sidebar-section {
            margin-bottom: 2rem;
        }

        .sidebar-section h3 {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--primary-color);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* 中央區域 */
        .main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            overflow-y: auto;
        }

        .panel {
            background-color: var(--card-color);
            border-radius: var(--radius);
            padding: 1.5rem;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
        }

        .panel-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--primary-color);
        }

        /* 表單元素 */
        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        input[type="text"],
        input[type="number"],
        select,
        textarea {
            width: 100%;
            padding: 0.75rem;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus,
        input[type="number"]:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        /* 按鈕 */
        button {
            padding: 0.75rem 1.5rem;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: var(--radius);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.95rem;
        }

        button:hover {
            background-color: #5558e3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(99, 102, 241, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        button.secondary {
            background-color: var(--secondary-color);
        }

        button.secondary:hover {
            background-color: #db2777;
        }

        button.success {
            background-color: var(--success-color);
        }

        button.success:hover {
            background-color: #059669;
        }

        button.small {
            padding: 0.5rem 1rem;
            font-size: 0.85rem;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* 角色卡片 */
        .character-card {
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 1rem;
            margin-bottom: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .character-card:hover {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .character-card.active {
            border-color: var(--primary-color);
            background-color: rgba(99, 102, 241, 0.1);
        }

        .character-image {
            width: 100%;
            height: 150px;
            background-color: var(--border-color);
            border-radius: var(--radius);
            margin-bottom: 0.75rem;
            object-fit: cover;
        }

        .character-name {
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .character-role {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        /* 對話框 */
        .dialogue-item {
            background-color: var(--bg-color);
            border-left: 3px solid var(--primary-color);
            padding: 1rem;
            margin-bottom: 1rem;
            border-radius: var(--radius);
        }

        .dialogue-item.guest {
            border-left-color: var(--secondary-color);
        }

        .dialogue-character {
            font-weight: 600;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            color: var(--primary-color);
        }

        .dialogue-item.guest .dialogue-character {
            color: var(--secondary-color);
        }

        .dialogue-text {
            margin-bottom: 0.75rem;
            line-height: 1.5;
        }

        .dialogue-controls {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        /* 播放控制 */
        .player-controls {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .player-controls button {
            padding: 0.5rem 1rem;
            font-size: 0.85rem;
        }

        .player-status {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        /* 加載狀態 */
        .loading {
            display: inline-block;
            width: 1rem;
            height: 1rem;
            border: 2px solid var(--border-color);
            border-top-color: var(--primary-color);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 提示信息 */
        .alert {
            padding: 1rem;
            border-radius: var(--radius);
            margin-bottom: 1rem;
            display: flex;
            gap: 0.75rem;
            align-items: flex-start;
        }

        .alert.success {
            background-color: rgba(16, 185, 129, 0.1);
            border: 1px solid var(--success-color);
            color: var(--success-color);
        }

        .alert.error {
            background-color: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--danger-color);
            color: var(--danger-color);
        }

        .alert.warning {
            background-color: rgba(245, 158, 11, 0.1);
            border: 1px solid var(--warning-color);
            color: var(--warning-color);
        }

        .alert.info {
            background-color: rgba(99, 102, 241, 0.1);
            border: 1px solid var(--primary-color);
            color: var(--primary-color);
        }

        /* 標籤 */
        .badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            background-color: var(--primary-color);
            color: white;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .badge.secondary {
            background-color: var(--secondary-color);
        }

        /* 響應式設計 */
        @media (max-width: 1024px) {
            .main-content {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                max-height: 300px;
            }
        }

        @media (max-width: 768px) {
            .header {
                padding: 1rem;
                flex-direction: column;
                align-items: stretch;
            }

            .header h1 {
                font-size: 1.25rem;
            }

            .header-actions {
                width: 100%;
            }

            .header-actions button {
                flex: 1;
                padding: 0.5rem;
                font-size: 0.85rem;
            }

            .main-content {
                padding: 0.5rem;
                gap: 0.5rem;
            }

            .sidebar {
                padding: 1rem;
            }

            .panel {
                padding: 1rem;
            }

            .dialogue-controls {
                flex-direction: column;
            }

            .dialogue-controls button {
                width: 100%;
            }
        }

        /* 標籤頁 */
        .tabs {
            display: flex;
            gap: 0.5rem;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 1rem;
        }

        .tab-button {
            padding: 0.75rem 1.5rem;
            background: none;
            border: none;
            border-bottom: 2px solid transparent;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .tab-button:hover {
            color: var(--text-primary);
        }

        .tab-button.active {
            color: var(--primary-color);
            border-bottom-color: var(--primary-color);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* 圖像上傳 */
        .image-upload {
            border: 2px dashed var(--border-color);
            border-radius: var(--radius);
            padding: 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .image-upload:hover {
            border-color: var(--primary-color);
            background-color: rgba(99, 102, 241, 0.05);
        }

        .image-upload input {
            display: none;
        }

        /* 網格佈局 */
        .grid {
            display: grid;
            gap: 1rem;
        }

        .grid.cols-2 {
            grid-template-columns: repeat(2, 1fr);
        }

        @media (max-width: 768px) {
            .grid.cols-2 {
                grid-template-columns: 1fr;
            }
        }

        /* 滑塊 */
        input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: var(--border-color);
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--primary-color);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        input[type="range"]::-moz-range-thumb {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--primary-color);
            cursor: pointer;
            border: none;
            transition: all 0.3s ease;
        }

        input[type="range"]::-moz-range-thumb:hover {
            transform: scale(1.2);
        }

        /* 模態對話框 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background-color: var(--card-color);
            border-radius: var(--radius);
            padding: 2rem;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: var(--shadow);
        }

        .modal-header {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }

        .modal-footer {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
            justify-content: flex-end;
        }

        /* 進度條 */
        .progress-bar {
            width: 100%;
            height: 4px;
            background-color: var(--border-color);
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 1rem;
        }

        .progress-fill {
            height: 100%;
            background-color: var(--primary-color);
            transition: width 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 頂部導航 -->
        <div class="header">
            <h1>🎙️ VTuber 訪談系統</h1>
            <div class="header-actions">
                <button onclick="createNewInterview()">新建訪談</button>
                <button class="secondary" onclick="importData()">匯入</button>
                <button class="success" onclick="exportData()">匯出</button>
            </div>
        </div>

        <!-- 主容器 -->
        <div class="main-content">
            <!-- 左側邊欄 - 角色管理 -->
            <div class="sidebar">
                <div class="sidebar-section">
                    <h3>角色管理</h3>
                    <div id="characterList"></div>
                    <button onclick="showAddCharacterModal()" style="width: 100%; margin-top: 1rem;">+ 新增角色</button>
                </div>

                <div class="sidebar-section">
                    <h3>快速操作</h3>
                    <button onclick="generateCharacterImage()" style="width: 100%; margin-bottom: 0.5rem;">🖼️ 生成圖像</button>
                    <button class="secondary" onclick="toggleCharacterEditor()" style="width: 100%;">✏️ 編輯角色</button>
                </div>
            </div>

            <!-- 中央區域 -->
            <div class="main-area">
                <!-- 訪談設定 -->
                <div class="panel">
                    <div class="panel-title">訪談設定</div>
                    <div class="form-group">
                        <label for="interviewTopic">訪談主題</label>
                        <input type="text" id="interviewTopic" placeholder="例如：燒仙草怎樣才比較好吃" value="燒仙草怎樣才比較好吃">
                    </div>
                    <div class="grid cols-2">
                        <div class="form-group">
                            <label for="hostCharacter">主播</label>
                            <select id="hostCharacter"></select>
                        </div>
                        <div class="form-group">
                            <label for="guestCharacter">來賓</label>
                            <select id="guestCharacter"></select>
                        </div>
                    </div>
                    <button onclick="generateDialogue()" style="width: 100%;">🤖 生成對話</button>
                </div>

                <!-- 對話編輯 -->
                <div class="panel">
                    <div class="panel-title">訪談對話</div>
                    <div id="dialogueContainer"></div>
                    <button onclick="addDialogueItem()" style="width: 100%; margin-top: 1rem;">+ 新增對話</button>
                </div>

                <!-- 播放控制 -->
                <div class="panel">
                    <div class="panel-title">播放控制</div>
                    <div class="player-controls">
                        <button onclick="playAll()">▶️ 播放全部</button>
                        <button class="secondary" onclick="stopPlayback()">⏹️ 停止</button>
                        <button class="success" onclick="synthesizeAllSpeech()">🔊 合成語音</button>
                    </div>
                    <div id="playerStatus" class="player-status" style="margin-top: 1rem;"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 新增角色模態 -->
    <div id="addCharacterModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">新增角色</div>
            <div class="form-group">
                <label for="charName">角色名稱</label>
                <input type="text" id="charName" placeholder="例如：小隻">
            </div>
            <div class="form-group">
                <label for="charRole">角色身份</label>
                <select id="charRole">
                    <option value="host">主播</option>
                    <option value="guest">來賓</option>
                </select>
            </div>
            <div class="form-group">
                <label for="charDescription">角色描述</label>
                <textarea id="charDescription" placeholder="描述角色的特徵、個性等"></textarea>
            </div>
            <div class="form-group">
                <label for="charImageUrl">角色圖像 URL</label>
                <input type="text" id="charImageUrl" placeholder="https://...">
            </div>
            <div class="form-group">
                <label for="charVoice">語音</label>
                <select id="charVoice">
                    <option value="en-US-Neural2-C">高音 (女性)</option>
                    <option value="en-US-Neural2-A">低音 (女性)</option>
                    <option value="en-US-Neural2-E">中音 (男性)</option>
                    <option value="en-US-Neural2-D">低音 (男性)</option>
                </select>
            </div>
            <div class="form-group">
                <label for="charSpeed">語速 (0.5 - 2.0)</label>
                <input type="number" id="charSpeed" min="0.5" max="2.0" step="0.1" value="1.0">
            </div>
            <div class="form-group">
                <label for="charPitch">音高 (0.5 - 2.0)</label>
                <input type="number" id="charPitch" min="0.5" max="2.0" step="0.1" value="1.0">
            </div>
            <div class="modal-footer">
                <button onclick="closeModal('addCharacterModal')">取消</button>
                <button class="success" onclick="saveCharacter()">保存</button>
            </div>
        </div>
    </div>

    <!-- 編輯對話模態 -->
    <div id="editDialogueModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">編輯對話</div>
            <div class="form-group">
                <label for="editDialogueCharacter">角色</label>
                <select id="editDialogueCharacter"></select>
            </div>
            <div class="form-group">
                <label for="editDialogueText">對話內容</label>
                <textarea id="editDialogueText"></textarea>
            </div>
            <div class="modal-footer">
                <button onclick="closeModal('editDialogueModal')">取消</button>
                <button class="success" onclick="saveDialogueEdit()">保存</button>
            </div>
        </div>
    </div>

    <script>
        // ========== 全局狀態 ==========
        const state = {
            characters: [],
            currentInterview: {
                title: '新訪談',
                topic: '',
                dialogue: []
            },
            selectedCharacterId: null,
            editingDialogueIndex: null,
            isPlaying: false,
            currentAudioIndex: 0
        };

        // ========== 初始化 ==========
        document.addEventListener('DOMContentLoaded', async () => {
            loadDataFromStorage();
            renderCharacterList();
            updateCharacterSelects();
            await initializePuterJS();
        });

        // ========== Puter.js 初始化 ==========
        async function initializePuterJS() {
            try {
                if (typeof puter !== 'undefined') {
                    console.log('✅ Puter.js 已成功加載');
                } else {
                    console.warn('⚠️ Puter.js 未加載，某些功能可能不可用');
                }
            } catch (error) {
                console.error('❌ Puter.js 初始化失敗:', error);
            }
        }

        // ========== 角色管理 ==========
        function renderCharacterList() {
            const container = document.getElementById('characterList');
            container.innerHTML = '';

            state.characters.forEach((char, index) => {
                const card = document.createElement('div');
                card.className = `character-card ${state.selectedCharacterId === char.id ? 'active' : ''}`;
                card.onclick = () => selectCharacter(char.id);

                card.innerHTML = `
                    <img src="${char.imageUrl || 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%22100%22%3E%3Crect fill=%22%23334155%22 width=%22100%22 height=%22100%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23cbd5e1%22 font-size=%2214%22%3E圖像%3C/text%3E%3C/svg%3E'}" class="character-image" alt="${char.name}">
                    <div class="character-name">${char.name}</div>
                    <div class="character-role"><span class="badge ${char.role === 'host' ? '' : 'secondary'}">${char.role === 'host' ? '主播' : '來賓'}</span></div>
                    <div style="margin-top: 0.75rem; display: flex; gap: 0.5rem;">
                        <button class="small" onclick="editCharacter('${char.id}', event)">編輯</button>
                        <button class="small secondary" onclick="deleteCharacter('${char.id}', event)">刪除</button>
                    </div>
                `;

                container.appendChild(card);
            });
        }

        function selectCharacter(id) {
            state.selectedCharacterId = id;
            renderCharacterList();
        }

        function showAddCharacterModal() {
            document.getElementById('addCharacterModal').classList.add('active');
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }

        function saveCharacter() {
            const name = document.getElementById('charName').value;
            const role = document.getElementById('charRole').value;
            const description = document.getElementById('charDescription').value;
            const imageUrl = document.getElementById('charImageUrl').value;
            const voice = document.getElementById('charVoice').value;
            const speed = parseFloat(document.getElementById('charSpeed').value);
            const pitch = parseFloat(document.getElementById('charPitch').value);

            if (!name.trim()) {
                alert('請輸入角色名稱');
                return;
            }

            const character = {
                id: `char_${Date.now()}`,
                name,
                role,
                description,
                imageUrl,
                voiceConfig: {
                    engine: 'google',
                    voiceId: voice,
                    language: 'zh-TW',
                    speed,
                    pitch
                }
            };

            state.characters.push(character);
            saveDataToStorage();
            renderCharacterList();
            updateCharacterSelects();
            closeModal('addCharacterModal');

            document.getElementById('charName').value = '';
            document.getElementById('charDescription').value = '';
            document.getElementById('charImageUrl').value = '';

            showNotification('✅ 角色已新增', 'success');
        }

        function editCharacter(id, event) {
            event.stopPropagation();
            const char = state.characters.find(c => c.id === id);
            if (!char) return;

            document.getElementById('charName').value = char.name;
            document.getElementById('charRole').value = char.role;
            document.getElementById('charDescription').value = char.description;
            document.getElementById('charImageUrl').value = char.imageUrl || '';
            document.getElementById('charVoice').value = char.voiceConfig.voiceId;
            document.getElementById('charSpeed').value = char.voiceConfig.speed;
            document.getElementById('charPitch').value = char.voiceConfig.pitch;

            const originalSaveCharacter = window.saveCharacter;
            window.saveCharacter = function() {
                const name = document.getElementById('charName').value;
                const role = document.getElementById('charRole').value;
                const description = document.getElementById('charDescription').value;
                const imageUrl = document.getElementById('charImageUrl').value;
                const voice = document.getElementById('charVoice').value;
                const speed = parseFloat(document.getElementById('charSpeed').value);
                const pitch = parseFloat(document.getElementById('charPitch').value);

                char.name = name;
                char.role = role;
                char.description = description;
                char.imageUrl = imageUrl;
                char.voiceConfig.voiceId = voice;
                char.voiceConfig.speed = speed;
                char.voiceConfig.pitch = pitch;

                saveDataToStorage();
                renderCharacterList();
                updateCharacterSelects();
                closeModal('addCharacterModal');
                window.saveCharacter = originalSaveCharacter;
                showNotification('✅ 角色已更新', 'success');
            };

            showAddCharacterModal();
        }

        function deleteCharacter(id, event) {
            event.stopPropagation();
            if (confirm('確定要刪除此角色嗎？')) {
                state.characters = state.characters.filter(c => c.id !== id);
                saveDataToStorage();
                renderCharacterList();
                updateCharacterSelects();
                showNotification('✅ 角色已刪除', 'success');
            }
        }

        // ========== 訪談管理 ==========
        function createNewInterview() {
            state.currentInterview = {
                title: `訪談 ${new Date().toLocaleString('zh-TW')}`,
                topic: document.getElementById('interviewTopic').value || '',
                dialogue: []
            };
            document.getElementById('dialogueContainer').innerHTML = '';
            showNotification('✅ 新訪談已建立', 'success');
        }

        async function generateDialogue() {
            const topic = document.getElementById('interviewTopic').value;
            const hostId = document.getElementById('hostCharacter').value;
            const guestId = document.getElementById('guestCharacter').value;

            if (!topic.trim()) {
                showNotification('❌ 請輸入訪談主題', 'error');
                return;
            }

            if (!hostId || !guestId) {
                showNotification('❌ 請選擇主播和來賓', 'error');
                return;
            }

            const host = state.characters.find(c => c.id === hostId);
            const guest = state.characters.find(c => c.id === guestId);

            showNotification('⏳ 正在生成對話...', 'info');

            try {
                if (typeof puter !== 'undefined' && puter.ai && puter.ai.chat) {
                    const prompt = `你是一個訪談節目的編劇。請為以下訪談生成一段有趣的對話。
                    
主題: ${topic}
主播: ${host.name} (${host.description})
來賓: ${guest.name} (${guest.description})

請生成 4-6 句對話，交替出現主播和來賓的發言。格式如下：
主播: [對話內容]
來賓: [對話內容]
...

請確保對話自然流暢，符合主題。`;

                    const response = await puter.ai.chat(prompt, {
                        model: 'gpt-4',
                        temperature: 0.7
                    });

                    const lines = response.split('\n').filter(line => line.trim());
                    state.currentInterview.dialogue = [];

                    lines.forEach((line, index) => {
                        if (line.includes('主播:')) {
                            state.currentInterview.dialogue.push({
                                characterId: hostId,
                                characterName: host.name,
                                text: line.replace('主播:', '').trim(),
                                voiceUrl: null
                            });
                        } else if (line.includes('來賓:')) {
                            state.currentInterview.dialogue.push({
                                characterId: guestId,
                                characterName: guest.name,
                                text: line.replace('來賓:', '').trim(),
                                voiceUrl: null
                            });
                        }
                    });

                    renderDialogue();
                    showNotification('✅ 對話已生成', 'success');
                } else {
                    generateSampleDialogue(hostId, guestId, host.name, guest.name);
                }
            } catch (error) {
                console.error('生成對話失敗:', error);
                generateSampleDialogue(hostId, guestId, host.name, guest.name);
            }
        }

        function generateSampleDialogue(hostId, guestId, hostName, guestName) {
            const sampleDialogues = [
                { role: 'host', text: '今天我們來討論燒仙草怎樣才比較好吃！' },
                { role: 'guest', text: '好啊，我覺得關鍵在於火候和配料的搭配。' },
                { role: 'host', text: '那你覺得什麼樣的火候最好呢？' },
                { role: 'guest', text: '我認為要用中火，讓仙草慢慢受熱，這樣才能保留香氣。' },
                { role: 'host', text: '原來如此！那配料方面呢？' },
                { role: 'guest', text: '配料很重要，我喜歡加蜂蜜、檸檬和冰塊，這樣既清爽又有層次感。' }
            ];

            state.currentInterview.dialogue = sampleDialogues.map(item => ({
                characterId: item.role === 'host' ? hostId : guestId,
                characterName: item.role === 'host' ? hostName : guestName,
                text: item.text,
                voiceUrl: null
            }));

            renderDialogue();
            showNotification('✅ 示例對話已加載', 'success');
        }

        function renderDialogue() {
            const container = document.getElementById('dialogueContainer');
            container.innerHTML = '';

            if (state.currentInterview.dialogue.length === 0) {
                container.innerHTML = '<p style="color: var(--text-secondary); text-align: center; padding: 2rem;">暫無對話，請先生成對話</p>';
                return;
            }

            state.currentInterview.dialogue.forEach((item, index) => {
                const div = document.createElement('div');
                const isGuest = state.characters.find(c => c.id === item.characterId)?.role === 'guest';
                div.className = `dialogue-item ${isGuest ? 'guest' : ''}`;

                div.innerHTML = `
                    <div class="dialogue-character">${item.characterName}</div>
                    <div class="dialogue-text">${item.text}</div>
                    <div class="dialogue-controls">
                        <button class="small" onclick="editDialogue(${index})">編輯</button>
                        <button class="small secondary" onclick="deleteDialogue(${index})">刪除</button>
                        <button class="small success" onclick="synthesizeSpeech(${index})">🔊 合成語音</button>
                        ${item.voiceUrl ? `<button class="small" onclick="playAudio(${index})">▶️ 播放</button>` : ''}
                    </div>
                `;

                container.appendChild(div);
            });
        }

        function addDialogueItem() {
            const hostId = document.getElementById('hostCharacter').value;
            if (!hostId) {
                showNotification('❌ 請先選擇主播', 'error');
                return;
            }

            state.currentInterview.dialogue.push({
                characterId: hostId,
                characterName: state.characters.find(c => c.id === hostId).name,
                text: '',
                voiceUrl: null
            });

            renderDialogue();
        }

        function editDialogue(index) {
            state.editingDialogueIndex = index;
            const item = state.currentInterview.dialogue[index];

            document.getElementById('editDialogueCharacter').innerHTML = state.characters
                .map(c => `<option value="${c.id}" ${c.id === item.characterId ? 'selected' : ''}>${c.name}</option>`)
                .join('');

            document.getElementById('editDialogueText').value = item.text;
            document.getElementById('editDialogueModal').classList.add('active');
        }

        function saveDialogueEdit() {
            const index = state.editingDialogueIndex;
            const characterId = document.getElementById('editDialogueCharacter').value;
            const text = document.getElementById('editDialogueText').value;

            if (!text.trim()) {
                showNotification('❌ 對話內容不能為空', 'error');
                return;
            }

            const character = state.characters.find(c => c.id === characterId);
            state.currentInterview.dialogue[index] = {
                characterId,
                characterName: character.name,
                text,
                voiceUrl: null
            };

            renderDialogue();
            closeModal('editDialogueModal');
            showNotification('✅ 對話已更新', 'success');
        }

        function deleteDialogue(index) {
            if (confirm('確定要刪除此對話嗎？')) {
                state.currentInterview.dialogue.splice(index, 1);
                renderDialogue();
                showNotification('✅ 對話已刪除', 'success');
            }
        }

        // ========== 語音合成 ==========
        async function synthesizeSpeech(index) {
            const item = state.currentInterview.dialogue[index];
            const character = state.characters.find(c => c.id === item.characterId);

            if (!character) {
                showNotification('❌ 找不到角色', 'error');
                return;
            }

            showNotification('⏳ 正在合成語音...', 'info');

            try {
                // 優先嘗試使用 Puter.js
                if (typeof puter !== 'undefined' && puter.ai && puter.ai.txt2speech) {
                    try {
                        const audioUrl = await puter.ai.txt2speech(item.text, {
                            voice: character.voiceConfig.voiceId
                        });

                        if (audioUrl) {
                            state.currentInterview.dialogue[index].voiceUrl = audioUrl;
                            renderDialogue();
                            showNotification('✅ 語音已合成 (Puter.js)', 'success');
                            return;
                        }
                    } catch (puterError) {
                        console.warn('Puter.js 語音合成失敗，嘗試備用方案:', puterError);
                    }
                }

                // 備用方案：使用瀏覽器原生 Web Speech API
                if ('speechSynthesis' in window) {
                    await synthesizeSpeechWebAPI(index, character, item.text);
                    showNotification('✅ 語音已合成 (Web Speech API)', 'success');
                } else {
                    showNotification('⚠️ 您的瀏覽器不支持語音合成功能', 'warning');
                }
            } catch (error) {
                console.error('語音合成失敗:', error);
                showNotification('❌ 語音合成失敗: ' + error.message, 'error');
            }
        }

        // Web Speech API 語音合成備用方案
        function synthesizeSpeechWebAPI(index, character, text) {
            return new Promise((resolve, reject) => {
                try {
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = 'zh-TW';
                    utterance.rate = character.voiceConfig.speed || 1.0;
                    utterance.pitch = character.voiceConfig.pitch || 1.0;
                    utterance.volume = 1.0;

                    state.currentInterview.dialogue[index].voiceUrl = `web-speech://${index}`;
                    state.currentInterview.dialogue[index].utterance = utterance;
                    renderDialogue();

                    resolve();
                } catch (error) {
                    reject(error);
                }
            });
        }

        async function synthesizeAllSpeech() {
            let successCount = 0;
            showNotification('⏳ 正在合成所有語音...', 'info');

            for (let i = 0; i < state.currentInterview.dialogue.length; i++) {
                try {
                    await synthesizeSpeech(i);
                    successCount++;
                    await new Promise(resolve => setTimeout(resolve, 500));
                } catch (error) {
                    console.error(`合成第 ${i + 1} 句語音失敗:`, error);
                }
            }

            showNotification(`✅ 已合成 ${successCount}/${state.currentInterview.dialogue.length} 句語音`, 'success');
        }

        function playAudio(index) {
            const item = state.currentInterview.dialogue[index];
            if (!item.voiceUrl) {
                showNotification('❌ 此對話還未合成語音', 'error');
                return;
            }

            if (item.voiceUrl.startsWith('web-speech://') && item.utterance) {
                speechSynthesis.cancel();
                speechSynthesis.speak(item.utterance);
                return;
            }

            const audio = new Audio(item.voiceUrl);
            audio.play().catch(error => {
                console.error('播放失敗:', error);
                showNotification('❌ 播放失敗', 'error');
            });
        }

        function playAll() {
            if (state.currentInterview.dialogue.length === 0) {
                showNotification('❌ 沒有對話可播放', 'error');
                return;
            }

            state.isPlaying = true;
            state.currentAudioIndex = 0;
            playNextAudio();
        }

        function playNextAudio() {
            if (!state.isPlaying || state.currentAudioIndex >= state.currentInterview.dialogue.length) {
                state.isPlaying = false;
                updatePlayerStatus();
                return;
            }

            const item = state.currentInterview.dialogue[state.currentAudioIndex];
            updatePlayerStatus();

            if (!item.voiceUrl) {
                state.currentAudioIndex++;
                setTimeout(playNextAudio, 100);
                return;
            }

            if (item.voiceUrl.startsWith('web-speech://') && item.utterance) {
                speechSynthesis.cancel();
                const utterance = item.utterance;
                utterance.onend = () => {
                    state.currentAudioIndex++;
                    setTimeout(playNextAudio, 300);
                };
                speechSynthesis.speak(utterance);
                return;
            }

            const audio = new Audio(item.voiceUrl);
            audio.onended = () => {
                state.currentAudioIndex++;
                setTimeout(playNextAudio, 300);
            };

            audio.play().catch(error => {
                console.error('播放失敗:', error);
                state.currentAudioIndex++;
                setTimeout(playNextAudio, 100);
            });
        }

        function stopPlayback() {
            state.isPlaying = false;
            state.currentAudioIndex = 0;
            updatePlayerStatus();
            showNotification('⏹️ 已停止播放', 'info');
        }

        function updatePlayerStatus() {
            const status = document.getElementById('playerStatus');
            if (state.isPlaying) {
                status.textContent = `正在播放: ${state.currentAudioIndex + 1}/${state.currentInterview.dialogue.length}`;
            } else {
                status.textContent = '已停止';
            }
        }

        // ========== 圖像生成 ==========
        async function generateCharacterImage() {
            const char = state.characters.find(c => c.id === state.selectedCharacterId);
            if (!char) {
                showNotification('❌ 請先選擇角色', 'error');
                return;
            }

            showNotification('⏳ 正在生成圖像...', 'info');
            const prompt = char.description || `anime character, ${char.name}`;
            const imageUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?width=512&height=512`;

            char.imageUrl = imageUrl;
            saveDataToStorage();
            renderCharacterList();
            showNotification('✅ 角色圖像已生成', 'success');
        }

        function toggleCharacterEditor() {
            showAddCharacterModal();
        }

        // ========== 數據持久化 ==========
        function saveDataToStorage() {
            localStorage.setItem('vtuberData', JSON.stringify({
                characters: state.characters,
                interview: state.currentInterview
            }));
        }

        function loadDataFromStorage() {
            const data = localStorage.getItem('vtuberData');
            if (data) {
                try {
                    const parsed = JSON.parse(data);
                    state.characters = parsed.characters || [];
                    state.currentInterview = parsed.interview || state.currentInterview;
                } catch (error) {
                    console.error('載入數據失敗:', error);
                }
            }

            if (state.characters.length === 0) {
                createDefaultCharacters();
            }
        }

        function createDefaultCharacters() {
            state.characters = [
                {
                    id: 'char_host',
                    name: '小隻',
                    role: 'host',
                    description: '年輕活力的主播，充滿熱情',
                    imageUrl: 'https://image.pollinations.ai/prompt/anime%20girl%20pink%20hair%20energetic?width=512&height=512',
                    voiceConfig: {
                        engine: 'google',
                        voiceId: 'en-US-Neural2-C',
                        language: 'zh-TW',
                        speed: 1.2,
                        pitch: 1.5
                    }
                },
                {
                    id: 'char_guest',
                    name: '單單',
                    role: 'guest',
                    description: '沉著冷靜的來賓，經驗豐富',
                    imageUrl: 'https://image.pollinations.ai/prompt/anime%20girl%20black%20hair%20calm?width=512&height=512',
                    voiceConfig: {
                        engine: 'google',
                        voiceId: 'en-US-Neural2-A',
                        language: 'zh-TW',
                        speed: 1.0,
                        pitch: 0.8
                    }
                }
            ];
            saveDataToStorage();
        }

        function updateCharacterSelects() {
            const hostSelect = document.getElementById('hostCharacter');
            const guestSelect = document.getElementById('guestCharacter');

            const options = state.characters
                .map(c => `<option value="${c.id}">${c.name}</option>`)
                .join('');

            hostSelect.innerHTML = options;
            guestSelect.innerHTML = options;

            if (state.characters.length > 0) {
                hostSelect.value = state.characters[0].id;
                guestSelect.value = state.characters.length > 1 ? state.characters[1].id : state.characters[0].id;
            }
        }

        // ========== 匯入匯出 ==========
        function exportData() {
            const data = {
                characters: state.characters,
                interview: state.currentInterview,
                exportDate: new Date().toISOString()
            };

            const json = JSON.stringify(data, null, 2);
            const blob = new Blob([json], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `vtuber_interview_${Date.now()}.json`;
            a.click();
            URL.revokeObjectURL(url);

            showNotification('✅ 數據已匯出', 'success');
        }

        function importData() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const data = JSON.parse(event.target.result);
                        state.characters = data.characters || [];
                        state.currentInterview = data.interview || state.currentInterview;
                        saveDataToStorage();
                        renderCharacterList();
                        updateCharacterSelects();
                        renderDialogue();
                        showNotification('✅ 數據已匯入', 'success');
                    } catch (error) {
                        showNotification('❌ 匯入失敗: ' + error.message, 'error');
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        }

        // ========== 通知 ==========
        function showNotification(message, type = 'info') {
            const notification = document.createElement('div');
            notification.className = `alert ${type}`;
            notification.innerHTML = `<span>${message}</span>`;
            notification.style.position = 'fixed';
            notification.style.top = '20px';
            notification.style.right = '20px';
            notification.style.zIndex = '2000';
            notification.style.maxWidth = '400px';
            notification.style.animation = 'slideIn 0.3s ease';

            document.body.appendChild(notification);

            setTimeout(() => {
                notification.style.animation = 'slideOut 0.3s ease';
                setTimeout(() => notification.remove(), 300);
            }, 3000);
        }

        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideIn {
                from {
                    transform: translateX(400px);
                    opacity: 0;
                }
                to {
                    transform: translateX(0);
                    opacity: 1;
                }
            }
            @keyframes slideOut {
                from {
                    transform: translateX(0);
                    opacity: 1;
                }
                to {
                    transform: translateX(400px);
                    opacity: 0;
                }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
