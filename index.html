<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>VTuber 訪談系統 - 語音訪談製作</title>
    <script src="https://js.puter.com/v2/"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #6366f1;
            --secondary-color: #ec4899;
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --danger-color: #ef4444;
            --bg-color: #0f172a;
            --card-color: #1e293b;
            --border-color: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --radius: 8px;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.6;
        }

        .container {
            display: flex;
            height: 100vh;
            flex-direction: column;
        }

        .header {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            padding: 1rem 2rem;
            box-shadow: var(--shadow);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .header-actions {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .main-content {
            display: flex;
            flex: 1;
            overflow: hidden;
            gap: 1rem;
            padding: 1rem;
        }

        .sidebar {
            width: 300px;
            background-color: var(--card-color);
            border-radius: var(--radius);
            padding: 1.5rem;
            overflow-y: auto;
            box-shadow: var(--shadow);
        }

        .sidebar-section {
            margin-bottom: 2rem;
        }

        .sidebar-section h3 {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--primary-color);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            overflow-y: auto;
        }

        .panel {
            background-color: var(--card-color);
            border-radius: var(--radius);
            padding: 1.5rem;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
        }

        .panel-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--primary-color);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        input[type="text"],
        input[type="number"],
        select,
        textarea {
            width: 100%;
            padding: 0.75rem;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus,
        input[type="number"]:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        button {
            padding: 0.75rem 1.5rem;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: var(--radius);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.95rem;
        }

        button:hover {
            background-color: #5558e3;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        button.secondary {
            background-color: var(--secondary-color);
        }

        button.secondary:hover {
            background-color: #db2777;
        }

        button.success {
            background-color: var(--success-color);
        }

        button.success:hover {
            background-color: #059669;
        }

        button.small {
            padding: 0.5rem 1rem;
            font-size: 0.8rem;
        }

        .character-card {
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 1rem;
            margin-bottom: 1rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .character-card:hover {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
        }

        .character-card.active {
            border-color: var(--primary-color);
            background-color: rgba(99, 102, 241, 0.1);
        }

        .character-image {
            width: 100%;
            height: 150px;
            background-color: var(--border-color);
            border-radius: var(--radius);
            margin-bottom: 0.75rem;
            object-fit: cover;
        }

        .character-name {
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            background-color: var(--primary-color);
            color: white;
            border-radius: 9999px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .badge.secondary {
            background-color: var(--secondary-color);
        }

        .dialogue-item {
            background-color: var(--bg-color);
            border-left: 3px solid var(--primary-color);
            padding: 1rem;
            margin-bottom: 1rem;
            border-radius: var(--radius);
        }

        .dialogue-item.guest {
            border-left-color: var(--secondary-color);
        }

        .dialogue-character {
            font-weight: 600;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            color: var(--primary-color);
        }

        .dialogue-item.guest .dialogue-character {
            color: var(--secondary-color);
        }

        .dialogue-text {
            margin-bottom: 0.75rem;
            line-height: 1.5;
        }

        .dialogue-controls {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .player-controls {
            display: flex;
            gap: 0.75rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .player-status {
            margin-top: 1rem;
            font-size: 0.85rem;
            background: var(--bg-color);
            padding: 0.5rem;
            border-radius: var(--radius);
            text-align: center;
        }

        .alert {
            padding: 1rem;
            border-radius: var(--radius);
            margin-bottom: 1rem;
            display: flex;
            gap: 0.75rem;
            align-items: flex-start;
        }

        .alert.success {
            background-color: rgba(16, 185, 129, 0.1);
            border: 1px solid var(--success-color);
            color: var(--success-color);
        }

        .alert.error {
            background-color: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--danger-color);
            color: var(--danger-color);
        }

        .alert.info {
            background-color: rgba(99, 102, 241, 0.1);
            border: 1px solid var(--primary-color);
            color: var(--primary-color);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background-color: var(--card-color);
            border-radius: var(--radius);
            padding: 2rem;
            max-width: 500px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
        }

        .modal-header {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }

        .modal-footer {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
            justify-content: flex-end;
        }

        .grid.cols-2 {
            display: grid;
            gap: 1rem;
            grid-template-columns: repeat(2, 1fr);
        }

        @media (max-width: 768px) {
            .main-content {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                max-height: 300px;
            }
            .grid.cols-2 {
                grid-template-columns: 1fr;
            }
            .dialogue-controls {
                flex-direction: column;
            }
            .dialogue-controls button {
                width: 100%;
            }
        }

        @keyframes slideIn {
            from { transform: translateX(400px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes slideOut {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(400px); opacity: 0; }
        }

        /* Puter 登入狀態列 */
        .puter-bar {
            display: flex; align-items: center; gap: 8px;
            padding: 4px 16px;
            background: rgba(0,0,0,0.25);
            border-bottom: 1px solid rgba(255,255,255,0.06);
            font-size: 0.72rem; color: #94a3b8;
            flex-shrink: 0;
        }
        .puter-badge {
            padding: 2px 10px; border-radius: 20px; font-size: 0.68rem; font-weight: 600;
        }
        .puter-badge.ok   { background: rgba(16,185,129,0.15); color: #10b981; border: 1px solid rgba(16,185,129,0.3); }
        .puter-badge.warn { background: rgba(245,158,11,0.15); color: #f59e0b; border: 1px solid rgba(245,158,11,0.3); }
        .puter-login-btn {
            padding: 3px 12px; border-radius: 20px; border: none; cursor: pointer;
            background: linear-gradient(90deg, #6366f1, #ec4899);
            color: white; font-size: 0.68rem; font-weight: 600;
            transition: opacity 0.2s;
        }
        .puter-login-btn:hover { opacity: 0.85; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🎙️ VTuber 訪談系統</h1>
        <div class="header-actions">
            <button onclick="createNewInterview()">📝 新建訪談</button>
            <button class="secondary" onclick="importData()">📂 匯入</button>
            <button class="success" onclick="exportData()">💾 匯出</button>
        </div>
    </div>


    <!-- Puter 登入狀態列 -->
    <div class="puter-bar">
        <span>🤖 AI 狀態：</span>
        <span class="puter-badge warn" id="puterBadge">初始化中…</span>
        <span id="puterFreeTag" style="color:#64748b;">免費 · 無需 API Key</span>
    </div>
    <div class="main-content">
        <div class="sidebar">
            <div class="sidebar-section">
                <h3>角色管理</h3>
                <div id="characterList"></div>
                <button onclick="showAddCharacterModal()" style="width: 100%; margin-top: 1rem;">+ 新增角色</button>
            </div>
            <div class="sidebar-section">
                <h3>快速工具</h3>
                <button onclick="generateCharacterImage()" style="width: 100%; margin-bottom: 0.5rem;">🎨 生成角色圖像</button>
                <button class="secondary" onclick="toggleCharacterEditor()" style="width: 100%;">✏️ 編輯角色</button>
            </div>
        </div>

        <div class="main-area">
            <div class="panel">
                <div class="panel-title">訪談設定</div>
                <div class="form-group">
                    <label for="interviewTopic">訪談主題</label>
                    <input type="text" id="interviewTopic" placeholder="例如：燒仙草怎樣才比較好吃" value="燒仙草怎樣才比較好吃">
                </div>
                <div class="grid cols-2">
                    <div class="form-group">
                        <label for="hostCharacter">主播</label>
                        <select id="hostCharacter"></select>
                    </div>
                    <div class="form-group">
                        <label for="guestCharacter">來賓</label>
                        <select id="guestCharacter"></select>
                    </div>
                </div>
                <button onclick="generateDialogue()" style="width: 100%;">🤖 生成對話 (AI)</button>
            </div>

            <div class="panel">
                <div class="panel-title">📝 訪談對話</div>
                <div id="dialogueContainer"></div>
                <button onclick="addDialogueItem()" style="width: 100%; margin-top: 1rem;">+ 新增對話</button>
            </div>

            <div class="panel">
                <div class="panel-title">🔊 語音播放控制</div>
                <div class="player-controls">
                    <button onclick="playAllDialogue()">▶️ 播放全部</button>
                    <button class="secondary" onclick="stopAllSpeech()">⏹️ 停止</button>
                    <button class="success" onclick="speakAllSequentially()">🔁 朗讀全部對話</button>
                </div>
                <div id="playerStatus" class="player-status">⚡ 就緒，點擊對話旁的「🔊朗讀」或「播放全部」</div>
            </div>
        </div>
    </div>
</div>

<!-- 新增/編輯角色視窗 -->
<div id="addCharacterModal" class="modal">
    <div class="modal-content">
        <div class="modal-header" id="charModalTitle">新增角色</div>
        <div class="form-group">
            <label>角色名稱</label>
            <input type="text" id="charName" placeholder="例如：小隻">
        </div>
        <div class="form-group">
            <label>角色身份</label>
            <select id="charRole">
                <option value="host">主播</option>
                <option value="guest">來賓</option>
            </select>
        </div>
        <div class="form-group">
            <label>角色描述 (個性/背景)</label>
            <textarea id="charDescription" placeholder="描述角色的特徵、語氣等"></textarea>
        </div>
        <div class="form-group">
            <label>角色圖像 URL (可選)</label>
            <input type="text" id="charImageUrl" placeholder="https://...">
        </div>
        <div class="form-group">
            <label>語速 (0.5 ~ 2.0)</label>
            <input type="number" id="charSpeed" min="0.5" max="2.0" step="0.1" value="1.0">
        </div>
        <div class="form-group">
            <label>音高 (0.5 ~ 2.0)</label>
            <input type="number" id="charPitch" min="0.5" max="2.0" step="0.1" value="1.0">
        </div>
        <div class="modal-footer">
            <button onclick="closeModal('addCharacterModal')">取消</button>
            <button class="success" onclick="saveCharacter()">保存</button>
        </div>
    </div>
</div>

<!-- 編輯對話視窗 -->
<div id="editDialogueModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">編輯對話</div>
        <div class="form-group">
            <label>發言角色</label>
            <select id="editDialogueCharacter"></select>
        </div>
        <div class="form-group">
            <label>對話內容</label>
            <textarea id="editDialogueText" rows="3"></textarea>
        </div>
        <div class="modal-footer">
            <button onclick="closeModal('editDialogueModal')">取消</button>
            <button class="success" onclick="saveDialogueEdit()">保存</button>
        </div>
    </div>
</div>

<script>
    // ---------- 全域狀態 ----------
    let state = {
        characters: [],
        currentInterview: {
            title: '新訪談',
            topic: '燒仙草怎樣才比較好吃',
            dialogue: []
        },
        selectedCharacterId: null,
        editingDialogueIndex: null,
        speechQueue: [],         // 播放佇列
        isSpeaking: false,
        currentUtterance: null
    };

    // ---------- 初始化 & 語音引擎 ----------
    let cachedVoice = null;  // 預設中文語音

    function getChineseVoice() {
        if (cachedVoice) return cachedVoice;
        const voices = speechSynthesis.getVoices();
        // 優先找 zh-TW / zh-CN
        let selected = voices.find(v => v.lang === 'zh-TW') || voices.find(v => v.lang === 'zh-CN') || voices.find(v => v.lang.startsWith('zh'));
        if (!selected && voices.length) selected = voices[0];
        cachedVoice = selected;
        return cachedVoice;
    }

    // 確保語音清單載入後重新整理一次快取
    if (typeof speechSynthesis !== 'undefined') {
        speechSynthesis.onvoiceschanged = () => {
            cachedVoice = null;
            getChineseVoice();
        };
        setTimeout(() => { getChineseVoice(); }, 200);
    }

    // 停止所有語音並清空佇列
    function stopAllSpeech() {
        if (window.speechSynthesis) {
            window.speechSynthesis.cancel();
        }
        state.isSpeaking = false;
        state.speechQueue = [];
        if (state.currentUtterance) {
            try { state.currentUtterance.onend = null; } catch(e) {}
            state.currentUtterance = null;
        }
        updatePlayerStatus('已停止播放', false);
    }

    // 朗讀單句 (直接播放，不打斷? 為了體驗，會先停止目前再播)
    function speakText(text, rate = 1.0, pitch = 1.0) {
        return new Promise((resolve, reject) => {
            if (!text || text.trim() === '') {
                reject('無文字');
                return;
            }
            // 停止目前正在播放的，避免重疊
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = Math.min(2.0, Math.max(0.5, rate));
            utterance.pitch = Math.min(2.0, Math.max(0.5, pitch));
            utterance.lang = 'zh-TW';
            const voice = getChineseVoice();
            if (voice) utterance.voice = voice;
            utterance.onend = () => {
                resolve();
            };
            utterance.onerror = (err) => {
                console.warn('語音錯誤', err);
                reject(err);
            };
            state.currentUtterance = utterance;
            window.speechSynthesis.speak(utterance);
        });
    }

    // 朗讀特定對話索引 (使用角色配置的語速/音高)
    async function speakDialogueAtIndex(index) {
        if (!state.currentInterview.dialogue[index]) return false;
        const item = state.currentInterview.dialogue[index];
        const character = state.characters.find(c => c.id === item.characterId);
        if (!character) {
            showNotification(`找不到角色設定，使用預設語音`, 'warning');
            await speakText(item.text, 1.0, 1.0);
            return true;
        }
        const speed = character.voiceConfig?.speed ?? 1.0;
        const pitch = character.voiceConfig?.pitch ?? 1.0;
        await speakText(item.text, speed, pitch);
        return true;
    }

    // 播放全部 (順序朗讀，帶進度顯示)
    async function playAllDialogue() {
        if (!state.currentInterview.dialogue.length) {
            showNotification('沒有對話可播放', 'error');
            return;
        }
        stopAllSpeech();
        const total = state.currentInterview.dialogue.length;
        updatePlayerStatus(`🎧 開始播放全部 (0/${total})`, true);
        for (let i = 0; i < total; i++) {
            if (!state.isSpeaking && !state.speechQueue.length) {
                // 如果被外部 stop 中斷則離開
                if (!state.isSpeaking && i>0) break;
            }
            state.isSpeaking = true;
            updatePlayerStatus(`🔊 播放中: ${i+1}/${total} - ${state.currentInterview.dialogue[i].characterName}`, true);
            try {
                await speakDialogueAtIndex(i);
            } catch (err) {
                console.warn('播放單句失敗', err);
            }
            // 避免連續播放過快
            await new Promise(r => setTimeout(r, 200));
        }
        state.isSpeaking = false;
        updatePlayerStatus('✅ 全部播放完畢', false);
    }

    // 朗讀全部對話 (類似播放全部但給獨立按鈕，行為一致)
    async function speakAllSequentially() {
        await playAllDialogue();
    }

    // 朗讀指定單句 (獨立按鈕)
    async function readSingleDialogue(index) {
        if (!state.currentInterview.dialogue[index]) return;
        stopAllSpeech();  // 中斷當下，立刻朗讀新句
        const item = state.currentInterview.dialogue[index];
        updatePlayerStatus(`🎙️ 正在朗讀: ${item.characterName} ...`, true);
        try {
            await speakDialogueAtIndex(index);
            updatePlayerStatus('✅ 朗讀完成', false);
        } catch (err) {
            updatePlayerStatus('❌ 朗讀失敗', false);
            showNotification('語音播放失敗，請重試', 'error');
        }
    }

    function updatePlayerStatus(msg, isPlaying = false) {
        const statusDiv = document.getElementById('playerStatus');
        if (statusDiv) statusDiv.innerHTML = msg;
        state.isSpeaking = isPlaying;
    }

    // ---------- 角色管理 ----------
    function renderCharacterList() {
        const container = document.getElementById('characterList');
        if (!container) return;
        container.innerHTML = '';
        state.characters.forEach(char => {
            const card = document.createElement('div');
            card.className = `character-card ${state.selectedCharacterId === char.id ? 'active' : ''}`;
            card.onclick = (e) => { if(!e.target.closest('button')) selectCharacter(char.id); };
            card.innerHTML = `
                <img src="${char.imageUrl || 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%22100%22%3E%3Crect fill=%22%23334155%22 width=%22100%22 height=%22100%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23cbd5e1%22 font-size=%2214%22%3E圖像%3C/text%3E%3C/svg%3E'}" class="character-image">
                <div class="character-name">${escapeHtml(char.name)}</div>
                <div class="character-role"><span class="badge ${char.role === 'host' ? '' : 'secondary'}">${char.role === 'host' ? '主播' : '來賓'}</span></div>
                <div style="margin-top: 0.75rem; display: flex; gap: 0.5rem;">
                    <button class="small" onclick="editCharacterById('${char.id}', event)">編輯</button>
                    <button class="small secondary" onclick="deleteCharacterById('${char.id}', event)">刪除</button>
                </div>
            `;
            container.appendChild(card);
        });
        if(state.characters.length === 0) container.innerHTML = '<p style="text-align:center; color:var(--text-secondary)">暫無角色，請新增</p>';
    }

    function selectCharacter(id) { state.selectedCharacterId = id; renderCharacterList(); }
    function showAddCharacterModal() { 
        document.getElementById('charModalTitle').innerText = '新增角色';
        document.getElementById('charName').value = '';
        document.getElementById('charDescription').value = '';
        document.getElementById('charImageUrl').value = '';
        document.getElementById('charSpeed').value = '1.0';
        document.getElementById('charPitch').value = '1.0';
        document.getElementById('charRole').value = 'guest';
        window._editingCharId = null;
        document.getElementById('addCharacterModal').classList.add('active');
    }
    function closeModal(id) { document.getElementById(id).classList.remove('active'); }
    function saveCharacter() {
        const name = document.getElementById('charName').value.trim();
        if(!name) { showNotification('請輸入角色名稱', 'error'); return; }
        const role = document.getElementById('charRole').value;
        const description = document.getElementById('charDescription').value;
        const imageUrl = document.getElementById('charImageUrl').value;
        const speed = parseFloat(document.getElementById('charSpeed').value);
        const pitch = parseFloat(document.getElementById('charPitch').value);
        const charData = {
            id: window._editingCharId || `char_${Date.now()}`,
            name, role, description, imageUrl,
            voiceConfig: { speed, pitch }
        };
        if(window._editingCharId) {
            const idx = state.characters.findIndex(c => c.id === window._editingCharId);
            if(idx !== -1) state.characters[idx] = charData;
            window._editingCharId = null;
        } else {
            state.characters.push(charData);
        }
        saveDataToStorage();
        renderCharacterList();
        updateCharacterSelects();
        closeModal('addCharacterModal');
        showNotification(`角色「${name}」已${window._editingCharId ? '更新' : '新增'}`, 'success');
    }
    function editCharacterById(id, event) {
        if(event) event.stopPropagation();
        const char = state.characters.find(c => c.id === id);
        if(!char) return;
        document.getElementById('charModalTitle').innerText = '編輯角色';
        document.getElementById('charName').value = char.name;
        document.getElementById('charRole').value = char.role;
        document.getElementById('charDescription').value = char.description || '';
        document.getElementById('charImageUrl').value = char.imageUrl || '';
        document.getElementById('charSpeed').value = char.voiceConfig?.speed ?? 1.0;
        document.getElementById('charPitch').value = char.voiceConfig?.pitch ?? 1.0;
        window._editingCharId = char.id;
        document.getElementById('addCharacterModal').classList.add('active');
    }
    function deleteCharacterById(id, event) {
        event.stopPropagation();
        if(confirm('刪除角色會影響已有對話，確定嗎？')) {
            state.characters = state.characters.filter(c => c.id !== id);
            // 將對話中相關角色的發言保留但角色遺失處理，直接保留文字但避免錯誤，渲染時會檢查角色是否存在
            saveDataToStorage();
            renderCharacterList();
            updateCharacterSelects();
            renderDialogue();
            showNotification('角色已刪除', 'success');
        }
    }
    function toggleCharacterEditor() { showAddCharacterModal(); }

    // 對話渲染
    function renderDialogue() {
        const container = document.getElementById('dialogueContainer');
        if(!container) return;
        if(state.currentInterview.dialogue.length === 0) {
            container.innerHTML = '<p style="color: var(--text-secondary); text-align:center; padding:2rem;">暫無對話，請點「生成對話」或手動新增</p>';
            return;
        }
        container.innerHTML = '';
        state.currentInterview.dialogue.forEach((item, idx) => {
            const character = state.characters.find(c => c.id === item.characterId);
            const charName = character ? character.name : item.characterName || '未知角色';
            const isGuest = character?.role === 'guest';
            const div = document.createElement('div');
            div.className = `dialogue-item ${isGuest ? 'guest' : ''}`;
            div.innerHTML = `
                <div class="dialogue-character">${escapeHtml(charName)}</div>
                <div class="dialogue-text">${escapeHtml(item.text)}</div>
                <div class="dialogue-controls">
                    <button class="small" onclick="editDialogueItem(${idx})">✏️ 編輯</button>
                    <button class="small secondary" onclick="deleteDialogueItem(${idx})">🗑️ 刪除</button>
                    <button class="small success" onclick="readSingleDialogue(${idx})">🔊 朗讀</button>
                </div>
            `;
            container.appendChild(div);
        });
    }
    function editDialogueItem(index) {
        state.editingDialogueIndex = index;
        const item = state.currentInterview.dialogue[index];
        const selectEl = document.getElementById('editDialogueCharacter');
        selectEl.innerHTML = state.characters.map(c => `<option value="${c.id}" ${c.id === item.characterId ? 'selected' : ''}>${escapeHtml(c.name)}</option>`).join('');
        document.getElementById('editDialogueText').value = item.text;
        document.getElementById('editDialogueModal').classList.add('active');
    }
    function saveDialogueEdit() {
        const idx = state.editingDialogueIndex;
        const newCharId = document.getElementById('editDialogueCharacter').value;
        const newText = document.getElementById('editDialogueText').value.trim();
        if(!newText) { showNotification('對話內容不可空白', 'error'); return; }
        const targetChar = state.characters.find(c => c.id === newCharId);
        if(!targetChar) { showNotification('請選擇有效角色', 'error'); return; }
        state.currentInterview.dialogue[idx] = {
            characterId: targetChar.id,
            characterName: targetChar.name,
            text: newText
        };
        saveDataToStorage();
        renderDialogue();
        closeModal('editDialogueModal');
        showNotification('對話已更新', 'success');
    }
    function deleteDialogueItem(idx) {
        if(confirm('刪除此對話？')) {
            state.currentInterview.dialogue.splice(idx,1);
            renderDialogue();
            saveDataToStorage();
        }
    }
    function addDialogueItem() {
        const hostId = document.getElementById('hostCharacter').value;
        if(!hostId || !state.characters.length) { showNotification('請先新增角色並選擇主播', 'error'); return; }
        const hostChar = state.characters.find(c => c.id === hostId);
        if(!hostChar) return;
        state.currentInterview.dialogue.push({
            characterId: hostChar.id,
            characterName: hostChar.name,
            text: '輸入新對話內容...'
        });
        renderDialogue();
        saveDataToStorage();
    }

    // AI 生成對話 (保留 AI 生成能力，優先 puter)
    
async function generateDialogue() {

    const topic = document.getElementById('interviewTopic').value.trim();

    const hostId = document.getElementById('hostCharacter').value;

    const guestId = document.getElementById('guestCharacter').value;

    if (!hostId || !guestId) {
        showNotification('請選擇主播與來賓', 'error');
        return;
    }

    const host = state.characters.find(c => c.id === hostId);
    const guest = state.characters.find(c => c.id === guestId);

    updatePlayerStatus('AI 生成中...', true);

    try {

        if (typeof puter === 'undefined') {
            throw new Error('Puter 未載入');
        }

        const prompt = `
請使用繁體中文。

主題：${topic}

主播：${host.name}
來賓：${guest.name}

請生成 30分鐘的自然訪談。

格式：

主播: 內容
來賓: 內容
`;

        let raw = '';

        const response = await puter.ai.chat(prompt, {
            model: 'gpt-4o-mini'
        });

        console.log(response);

        if (typeof response === 'string') {
            raw = response;
        }

        else if (response?.choices?.[0]?.message?.content) {
            raw = response.choices[0].message.content;
        }

        else if (response?.message?.content) {

            if (typeof response.message.content === 'string') {
                raw = response.message.content;
            }

            else if (Array.isArray(response.message.content)) {
                raw = response.message.content
                    .map(x => x.text || '')
                    .join('');
            }
        }

        else if (response?.text) {
            raw = response.text;
        }

        else if (Array.isArray(response?.content)) {
            raw = response.content
                .map(x => x.text || '')
                .join('');
        }

        if (!raw) {
            throw new Error('AI 無內容');
        }

        const lines = raw
            .split(/\r?\n/)
            .map(x => x.trim())
            .filter(x => x);

        const newDialogue = [];

        for (const line of lines) {

            if (line.startsWith('主播:')) {

                newDialogue.push({
                    characterId: host.id,
                    characterName: host.name,
                    text: line.replace('主播:', '').trim()
                });
            }

            else if (line.startsWith('來賓:')) {

                newDialogue.push({
                    characterId: guest.id,
                    characterName: guest.name,
                    text: line.replace('來賓:', '').trim()
                });
            }
        }

        if (newDialogue.length === 0) {
            throw new Error('解析失敗');
        }

        state.currentInterview.dialogue = newDialogue;

        renderDialogue();

        saveDataToStorage();

        updatePlayerStatus('AI 完成', false);

        showNotification('AI 對話生成成功', 'success');

    }

    catch (error) {

        console.error(error);

        showNotification('AI 生成失敗', 'error');

        updatePlayerStatus('AI 失敗', false);
    }
}


    function createNewInterview() { state.currentInterview.dialogue = []; renderDialogue(); showNotification('新訪談已建立', 'success'); }
    async function generateCharacterImage() {
        const char = state.characters.find(c=>c.id===state.selectedCharacterId);
        if(!char) { showNotification('請先點選左側角色', 'error'); return; }
        const prompt = char.description || `${char.name} anime style character`;
        const url = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?width=512&height=512`;
        char.imageUrl = url;
        saveDataToStorage();
        renderCharacterList();
        showNotification('圖像生成中，請稍等載入', 'success');
    }
    function exportData() {
        const exportObj = { characters: state.characters, interview: state.currentInterview, exportDate: new Date().toISOString() };
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([JSON.stringify(exportObj,null,2)], {type:'application/json'}));
        a.download = `vtuber_${Date.now()}.json`;
        a.click();
        URL.revokeObjectURL(a.href);
        showNotification('匯出成功', 'success');
    }
    function importData() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.json';
        input.onchange = e => {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = ev => {
                try {
                    const data = JSON.parse(ev.target.result);
                    state.characters = data.characters || [];
                    state.currentInterview = data.interview || { dialogue: [] };
                    saveDataToStorage();
                    renderCharacterList();
                    updateCharacterSelects();
                    renderDialogue();
                    showNotification('匯入成功', 'success');
                } catch(err) { showNotification('匯入錯誤', 'error'); }
            };
            reader.readAsText(file);
        };
        input.click();
    }
    function saveDataToStorage() { localStorage.setItem('vtuberInterviewData', JSON.stringify({ characters: state.characters, interview: state.currentInterview })); }
    function loadDataFromStorage() {
        const raw = localStorage.getItem('vtuberInterviewData');
        if(raw) {
            try {
                const data = JSON.parse(raw);
                state.characters = data.characters || [];
                state.currentInterview = data.interview || { dialogue: [] };
            } catch(e) {}
        }
        if(state.characters.length === 0) createDefaultCharacters();
        updateCharacterSelects();
        renderCharacterList();
        renderDialogue();
    }
    function createDefaultCharacters() {
        state.characters = [
            { id: 'host_def', name: '小隻', role: 'host', description: '活潑可愛的主播', imageUrl: 'https://image.pollinations.ai/prompt/anime%20girl%20pink%20hair%20energetic', voiceConfig: { speed: 1.1, pitch: 1.3 } },
            { id: 'guest_def', name: '單單', role: 'guest', description: '知性冷靜的來賓', imageUrl: 'https://image.pollinations.ai/prompt/anime%20girl%20black%20hair%20calm', voiceConfig: { speed: 0.9, pitch: 0.9 } }
        ];
        saveDataToStorage();
    }
    function updateCharacterSelects() {
        const hostSel = document.getElementById('hostCharacter');
        const guestSel = document.getElementById('guestCharacter');
        const opts = state.characters.map(c => `<option value="${c.id}">${escapeHtml(c.name)}</option>`).join('');
        hostSel.innerHTML = opts; guestSel.innerHTML = opts;
        if(state.characters.length) {
            const hostExists = state.characters.find(c=>c.role==='host');
            const guestExists = state.characters.find(c=>c.role==='guest');
            hostSel.value = hostExists ? hostExists.id : state.characters[0].id;
            guestSel.value = guestExists ? guestExists.id : (state.characters[1]?.id || state.characters[0].id);
        }
    }
    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
    function showNotification(msg, type='info') {
        const div = document.createElement('div');
        div.className = `alert ${type}`;
        div.innerHTML = `<span>${msg}</span>`;
        div.style.position = 'fixed'; div.style.top='20px'; div.style.right='20px'; div.style.zIndex='9999'; div.style.animation='slideIn 0.2s ease';
        document.body.appendChild(div);
        setTimeout(()=>{ div.style.animation='slideOut 0.2s ease'; setTimeout(()=>div.remove(),250); }, 2800);
    }

    document.addEventListener('DOMContentLoaded', () => {
        loadDataFromStorage();
        if(typeof speechSynthesis !== 'undefined') getChineseVoice();
    });

    // ── Puter 登入初始化 ─────────────────────────────────────
    async function initPuter() {
        const badge   = document.getElementById('puterBadge');
        const freeTag = document.getElementById('puterFreeTag');
        try {
            if (typeof puter === 'undefined') {
                badge.textContent = '載入失敗';
                badge.className = 'puter-badge warn';
                return;
            }
            // 使用 Promise.race 加入 3 秒 timeout，避免跨域 iframe 永久卡住
            const timeoutPromise = new Promise((_, reject) =>
                setTimeout(() => reject(new Error('timeout')), 3000)
            );
            let signedIn = false;
            try {
                signedIn = await Promise.race([
                    Promise.resolve(puter.auth.isSignedIn()),
                    timeoutPromise
                ]);
            } catch(e) { signedIn = false; }

            if (signedIn) {
                let user = null;
                try {
                    user = await Promise.race([
                        puter.auth.getUser(),
                        new Promise((_, r) => setTimeout(() => r(new Error('timeout')), 3000))
                    ]);
                } catch(e) {}
                badge.textContent = user?.username ? `✓ ${user.username}` : '✓ 已登入';
                badge.className = 'puter-badge ok';
                freeTag.textContent = '免費 AI · Puter 帳號';
            } else {
                badge.textContent = '✓ 就緒';
                badge.className = 'puter-badge ok';
                freeTag.textContent = '免費 AI · 點擊「生成對話」即可使用';
            }
        } catch(e) {
            badge.textContent = '✓ 就緒';
            badge.className = 'puter-badge ok';
        }
    }

    // 頁面載入後初始化 Puter 狀態（加入 SDK 載入等待）
    window.addEventListener('load', async () => {
        // 等待 puter SDK 完成初始化，最多重試 10 次（每次 500ms）
        let retries = 0;
        const waitForPuter = setInterval(() => {
            retries++;
            if (typeof puter !== 'undefined') {
                clearInterval(waitForPuter);
                setTimeout(() => {
                initPuter();
            }, 1500);
            } else if (retries >= 10) {
                clearInterval(waitForPuter);
                const badge = document.getElementById('puterBadge');
                if (badge) { badge.textContent = 'SDK 載入失敗'; badge.className = 'puter-badge warn'; }
            }
        }, 500);
    });
</script>
