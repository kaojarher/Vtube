<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>VTuber 訪談系統 - 語音訪談製作</title>
    <script src="https://js.puter.com/v2/"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #6366f1;
            --secondary-color: #ec4899;
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --danger-color: #ef4444;
            --bg-color: #0f172a;
            --card-color: #1e293b;
            --border-color: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --radius: 8px;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.6;
        }

        .container {
            display: flex;
            height: 100vh;
            flex-direction: column;
        }

        .header {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            padding: 1rem 2rem;
            box-shadow: var(--shadow);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .header-actions {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .main-content {
            display: flex;
            flex: 1;
            overflow: hidden;
            gap: 1rem;
            padding: 1rem;
        }

        .sidebar {
            width: 300px;
            background-color: var(--card-color);
            border-radius: var(--radius);
            padding: 1.5rem;
            overflow-y: auto;
            box-shadow: var(--shadow);
        }

        .sidebar-section {
            margin-bottom: 2rem;
        }

        .sidebar-section h3 {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--primary-color);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            overflow-y: auto;
        }

        .panel {
            background-color: var(--card-color);
            border-radius: var(--radius);
            padding: 1.5rem;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
        }

        .panel-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--primary-color);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        input[type="text"],
        input[type="number"],
        select,
        textarea {
            width: 100%;
            padding: 0.75rem;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus,
        input[type="number"]:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        button {
            padding: 0.75rem 1.5rem;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: var(--radius);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.95rem;
        }

        button:hover {
            background-color: #5558e3;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        button.secondary {
            background-color: var(--secondary-color);
        }

        button.secondary:hover {
            background-color: #db2777;
        }

        button.success {
            background-color: var(--success-color);
        }

        button.success:hover {
            background-color: #059669;
        }

        button.small {
            padding: 0.5rem 1rem;
            font-size: 0.8rem;
        }

        .character-card {
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 1rem;
            margin-bottom: 1rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .character-card:hover {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
        }

        .character-card.active {
            border-color: var(--primary-color);
            background-color: rgba(99, 102, 241, 0.1);
        }

        .character-image {
            width: 100%;
            height: 150px;
            background-color: var(--border-color);
            border-radius: var(--radius);
            margin-bottom: 0.75rem;
            object-fit: cover;
        }

        .character-name {
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            background-color: var(--primary-color);
            color: white;
            border-radius: 9999px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .badge.secondary {
            background-color: var(--secondary-color);
        }

        .dialogue-item {
            background-color: var(--bg-color);
            border-left: 3px solid var(--primary-color);
            padding: 1rem;
            margin-bottom: 1rem;
            border-radius: var(--radius);
        }

        .dialogue-item.guest {
            border-left-color: var(--secondary-color);
        }

        .dialogue-character {
            font-weight: 600;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            color: var(--primary-color);
        }

        .dialogue-item.guest .dialogue-character {
            color: var(--secondary-color);
        }

        .dialogue-text {
            margin-bottom: 0.75rem;
            line-height: 1.5;
        }

        .dialogue-controls {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .player-controls {
            display: flex;
            gap: 0.75rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .player-status {
            margin-top: 1rem;
            font-size: 0.85rem;
            background: var(--bg-color);
            padding: 0.5rem;
            border-radius: var(--radius);
            text-align: center;
        }

        .alert {
            padding: 1rem;
            border-radius: var(--radius);
            margin-bottom: 1rem;
            display: flex;
            gap: 0.75rem;
            align-items: flex-start;
        }

        .alert.success {
            background-color: rgba(16, 185, 129, 0.1);
            border: 1px solid var(--success-color);
            color: var(--success-color);
        }

        .alert.error {
            background-color: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--danger-color);
            color: var(--danger-color);
        }

        .alert.info {
            background-color: rgba(99, 102, 241, 0.1);
            border: 1px solid var(--primary-color);
            color: var(--primary-color);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background-color: var(--card-color);
            border-radius: var(--radius);
            padding: 2rem;
            max-width: 500px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
        }

        .modal-header {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }

        .modal-footer {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
            justify-content: flex-end;
        }

        .grid.cols-2 {
            display: grid;
            gap: 1rem;
            grid-template-columns: repeat(2, 1fr);
        }

        @media (max-width: 768px) {
            .main-content {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                max-height: 300px;
            }
            .grid.cols-2 {
                grid-template-columns: 1fr;
            }
            .dialogue-controls {
                flex-direction: column;
            }
            .dialogue-controls button {
                width: 100%;
            }
        }

        @keyframes slideIn {
            from { transform: translateX(400px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes slideOut {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(400px); opacity: 0; }
        }
        @keyframes recDotBlink {
            0%,100% { opacity:1; transform:scale(1); }
            50%     { opacity:0.3; transform:scale(0.7); }
        }

        /* ══════ VTuber Stage Styles ══════ */
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');

        /* 待機：緩慢呼吸漂浮，4秒週期 */
        @keyframes vtb-idle {
            0%,100% { transform: translateY(0px)   scaleX(var(--sx,1)) rotate(0deg); }
            30%     { transform: translateY(-4px)   scaleX(var(--sx,1)) rotate(0.3deg); }
            60%     { transform: translateY(-2px)   scaleX(var(--sx,1)) rotate(-0.2deg); }
        }
        /* 說話：小幅度有機搖晃，模擬頭部說話微動 */
        @keyframes vtb-speak {
            0%   { transform: translateY(0px)  scaleX(var(--sx,1)) rotate(0deg); }
            15%  { transform: translateY(-2px) scaleX(var(--sx,1)) rotate(0.4deg); }
            30%  { transform: translateY(-1px) scaleX(var(--sx,1)) rotate(-0.3deg); }
            45%  { transform: translateY(-3px) scaleX(var(--sx,1)) rotate(0.5deg); }
            60%  { transform: translateY(-1px) scaleX(var(--sx,1)) rotate(-0.2deg); }
            75%  { transform: translateY(-2px) scaleX(var(--sx,1)) rotate(0.3deg); }
            100% { transform: translateY(0px)  scaleX(var(--sx,1)) rotate(0deg); }
        }
        @keyframes vtb-subtitle-in {
            from { opacity:0; transform:translateY(10px); }
            to   { opacity:1; transform:translateY(0); }
        }
        @keyframes vtb-glow-pulse {
            0%,100% { box-shadow:0 0 30px rgba(99,102,241,0.6); }
            50%     { box-shadow:0 0 60px rgba(99,102,241,1), 0 0 100px rgba(99,102,241,0.4); }
        }
        @keyframes vtb-glow-pulse-pink {
            0%,100% { box-shadow:0 0 30px rgba(236,72,153,0.6); }
            50%     { box-shadow:0 0 60px rgba(236,72,153,1), 0 0 100px rgba(236,72,153,0.4); }
        }

        .vtb-char-wrap {
            display:flex; flex-direction:column; align-items:center;
            position:relative; cursor:default;
            transition: filter 0.6s cubic-bezier(0.4,0,0.2,1),
                        transform 0.6s cubic-bezier(0.4,0,0.2,1);
        }
        .vtb-char-wrap.dimmed {
            filter: brightness(0.28) saturate(0.3);
            transform: scale(0.95);
        }
        .vtb-char-wrap.speaking {
            filter: brightness(1.1) saturate(1.2) drop-shadow(0 0 20px currentColor);
            transform: scale(1.04);
        }
        .vtb-char-img {
            width: 520px; height: 840px;
            object-fit: contain; object-position: bottom center;
            border-radius: 0;
            animation: vtb-idle 4s ease-in-out infinite;
            --sx: 1;
            image-rendering: crisp-edges;
            filter: drop-shadow(0 10px 40px rgba(0,0,0,0.7));
        }
        .vtb-char-img.speaking-anim {
            animation: vtb-speak 1.2s ease-in-out infinite;
        }
        .vtb-char-img.idle-anim {
            animation: vtb-idle 4s ease-in-out infinite;
        }
        .vtb-char-label {
            font-family:'Noto Sans TC',sans-serif;
            font-size:0.78rem; font-weight:700; letter-spacing:0.12em;
            padding:4px 16px; border-radius:20px; margin-top:10px;
            transition:all 0.5s ease; opacity:0.5;
            border:1px solid transparent;
        }
        .vtb-char-wrap.speaking .vtb-char-label {
            opacity:1;
        }
        .vtb-char-wrap.host-char .vtb-char-label {
            background:rgba(99,102,241,0.2); color:#a5b4fc;
            border-color:rgba(99,102,241,0.5);
        }
        .vtb-char-wrap.guest-char .vtb-char-label {
            background:rgba(236,72,153,0.2); color:#f9a8d4;
            border-color:rgba(236,72,153,0.5);
        }
        .vtb-char-wrap.speaking.host-char .vtb-char-label {
            animation: vtb-glow-pulse 1.5s ease-in-out infinite;
            background:rgba(99,102,241,0.35);
        }
        .vtb-char-wrap.speaking.guest-char .vtb-char-label {
            animation: vtb-glow-pulse-pink 1.5s ease-in-out infinite;
            background:rgba(236,72,153,0.35);
        }
        /* mouth ripple indicator */
        .vtb-mouth-bar {
            display:flex; gap:3px; margin-top:6px; height:18px; align-items:center;
            opacity:0; transition:opacity 0.3s;
        }
        .vtb-char-wrap.speaking .vtb-mouth-bar { opacity:1; }
        .vtb-mouth-bar span {
            width:3px; background:#a5b4fc; border-radius:2px;
            animation:none;
        }
        .vtb-char-wrap.guest-char .vtb-mouth-bar span { background:#f9a8d4; }
        @keyframes vtb-bar1 { 0%,100%{height:4px}  50%{height:16px} }
        @keyframes vtb-bar2 { 0%,100%{height:8px}  40%{height:4px}  }
        @keyframes vtb-bar3 { 0%,100%{height:14px} 60%{height:6px}  }
        @keyframes vtb-bar4 { 0%,100%{height:6px}  30%{height:14px} }
        @keyframes vtb-bar5 { 0%,100%{height:10px} 70%{height:4px}  }
        .vtb-char-wrap.speaking .vtb-mouth-bar span:nth-child(1){animation:vtb-bar1 0.5s ease infinite;}
        .vtb-char-wrap.speaking .vtb-mouth-bar span:nth-child(2){animation:vtb-bar2 0.4s ease infinite 0.1s;}
        .vtb-char-wrap.speaking .vtb-mouth-bar span:nth-child(3){animation:vtb-bar3 0.6s ease infinite 0.05s;}
        .vtb-char-wrap.speaking .vtb-mouth-bar span:nth-child(4){animation:vtb-bar4 0.45s ease infinite 0.15s;}
        .vtb-char-wrap.speaking .vtb-mouth-bar span:nth-child(5){animation:vtb-bar5 0.55s ease infinite 0.08s;}

        /* Puter 登入狀態列 */
        .puter-bar {
            display: flex; align-items: center; gap: 8px;
            padding: 4px 16px;
            background: rgba(0,0,0,0.25);
            border-bottom: 1px solid rgba(255,255,255,0.06);
            font-size: 0.72rem; color: #94a3b8;
            flex-shrink: 0;
        }
        .puter-badge {
            padding: 2px 10px; border-radius: 20px; font-size: 0.68rem; font-weight: 600;
        }
        .puter-badge.ok   { background: rgba(16,185,129,0.15); color: #10b981; border: 1px solid rgba(16,185,129,0.3); }
        .puter-badge.warn { background: rgba(245,158,11,0.15); color: #f59e0b; border: 1px solid rgba(245,158,11,0.3); }
        .puter-login-btn {
            padding: 3px 12px; border-radius: 20px; border: none; cursor: pointer;
            background: linear-gradient(90deg, #6366f1, #ec4899);
            color: white; font-size: 0.68rem; font-weight: 600;
            transition: opacity 0.2s;
        }
        .puter-login-btn:hover { opacity: 0.85; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🎙️ VTuber 訪談系統</h1>
        <div class="header-actions">
            <button onclick="createNewInterview()">📝 新建訪談</button>
            <button class="secondary" onclick="importData()">📂 匯入</button>
            <button class="success" onclick="exportData()">💾 匯出</button>
        </div>
    </div>


    <!-- Puter 登入狀態列 -->
    <div class="puter-bar">
        <span>🤖 AI 狀態：</span>
        <span class="puter-badge warn" id="puterBadge">初始化中…</span>
        <span id="puterFreeTag" style="color:#64748b;">免費 · 無需 API Key</span>
    </div>
    <div class="main-content">
        <div class="sidebar">
            <div class="sidebar-section">
                <h3>角色管理</h3>
                <div id="characterList"></div>
                <button onclick="showAddCharacterModal()" style="width: 100%; margin-top: 1rem;">+ 新增角色</button>
            </div>
            <div class="sidebar-section">
                <h3>快速工具</h3>
                <button onclick="generateCharacterImage()" style="width: 100%; margin-bottom: 0.5rem;">🎨 生成角色圖像</button>
                <button class="secondary" onclick="toggleCharacterEditor()" style="width: 100%;">✏️ 編輯角色</button>
            </div>
        </div>

        <div class="main-area">
            <div class="panel">
                <div class="panel-title">訪談設定</div>
                <div class="form-group">
                    <label for="interviewTopic">訪談主題</label>
                    <input type="text" id="interviewTopic" placeholder="例如：燒仙草怎樣才比較好吃" value="燒仙草怎樣才比較好吃">
                </div>
                <div class="grid cols-2">
                    <div class="form-group">
                        <label for="hostCharacter">主播</label>
                        <select id="hostCharacter"></select>
                    </div>
                    <div class="form-group">
                        <label for="guestCharacter">來賓</label>
                        <select id="guestCharacter"></select>
                    </div>
                </div>
                <button onclick="generateDialogue()" style="width: 100%;">🤖 生成對話 (AI)</button>
            </div>

            <div class="panel">
                <div class="panel-title">📝 訪談對話</div>
                <div id="dialogueContainer"></div>
                <button onclick="addDialogueItem()" style="width: 100%; margin-top: 1rem;">+ 新增對話</button>
            </div>

            <div class="panel">
                <div class="panel-title">🔊 語音播放控制</div>
                <div class="player-controls">
                    <button onclick="playAllDialogue()">▶️ 播放全部</button>
                    <button class="secondary" onclick="stopAllSpeech()">⏹️ 停止</button>
                    <button class="success" onclick="speakAllSequentially()">🔁 朗讀全部對話</button>
                </div>
                <div id="playerStatus" class="player-status">⚡ 就緒，點擊對話旁的「🔊朗讀」或「播放全部」</div>
            </div>
        </div>
    </div>
</div>

<!-- ═══════════════ VTuber 舞台視窗 ═══════════════ -->
<div id="vtuberStageModal" style="
    display:none; position:fixed; inset:0; z-index:2000;
    background: #0a0a0f;
    flex-direction:column; align-items:center; justify-content:flex-end;
    overflow:hidden;
">
    <!-- ── 背景圖層 ── -->
    <div id="stageBgLayer" style="
        position:absolute; inset:0; z-index:0;
        background-image: url('https://images.unsplash.com/photo-1555041469-a586c61ea9bc?w=1920&q=85');
        background-size:cover; background-position:center bottom;
        transition: opacity 0.6s ease;
    "></div>
    <!-- 背景暗化遮罩（保持角色可見度） -->
    <div style="
        position:absolute; inset:0; z-index:1; pointer-events:none;
        background: linear-gradient(to bottom,
            rgba(0,0,0,0.25) 0%,
            rgba(0,0,0,0.15) 50%,
            rgba(0,0,0,0.55) 100%);
    "></div>

    <!-- 星空粒子（純色背景時顯示） -->
    <canvas id="stageStarCanvas" style="position:absolute;inset:0;pointer-events:none;z-index:0;display:none;"></canvas>

    <!-- ── 背景選擇器面板 ── -->
    <div id="stageBgPicker" style="
        position:absolute; top:20px; left:20px; z-index:25;
        background:rgba(10,10,20,0.75); backdrop-filter:blur(12px);
        border:1px solid rgba(255,255,255,0.1); border-radius:14px;
        padding:14px 16px; min-width:220px;
        font-family:'Noto Sans TC',sans-serif;
        transition: transform 0.3s ease, opacity 0.3s ease;
    ">
        <div style="font-size:0.72rem;font-weight:700;letter-spacing:0.12em;color:#94a3b8;margin-bottom:10px;">🖼 舞台背景</div>

        <!-- 預設場景縮圖列 -->
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;" id="bgPresetRow"></div>

        <!-- 自訂 URL -->
        <div style="display:flex;gap:6px;margin-bottom:8px;">
            <input id="bgCustomUrl" type="text" placeholder="貼上圖片網址…"
                style="flex:1;padding:6px 10px;font-size:0.78rem;
                       background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);
                       border-radius:8px;color:#f1f5f9;font-family:inherit;outline:none;"
                onkeydown="if(event.key==='Enter')applyBgUrl(this.value)">
            <button onclick="applyBgUrl(document.getElementById('bgCustomUrl').value)"
                style="padding:6px 10px;font-size:0.75rem;border-radius:8px;
                       background:rgba(99,102,241,0.7);border:none;color:#fff;cursor:pointer;
                       font-family:inherit;white-space:nowrap;">套用</button>
        </div>

        <!-- 本地上傳 -->
        <label style="
            display:flex;align-items:center;gap:6px;cursor:pointer;
            padding:6px 10px;border-radius:8px;font-size:0.78rem;color:#cbd5e1;
            background:rgba(255,255,255,0.05);border:1px dashed rgba(255,255,255,0.15);
            transition:background 0.2s;
        " onmouseover="this.style.background='rgba(255,255,255,0.1)'"
           onmouseout="this.style.background='rgba(255,255,255,0.05)'">

    <!-- 字幕區 -->
    <div style="position:relative;z-index:10;width:100%;padding:0 40px 30px;text-align:center;">
        <div id="stageSubtitleSpeaker" style="

        ">— 準備中 —</div>
        <div id="stageSubtitleText" style="
            font-family:'Noto Sans TC',sans-serif; font-size:1.35rem; font-weight:500;
            color:#f1f5f9; line-height:1.7;

        <!-- 進度 -->
        <div id="stageProgress" style="

    <!-- 錄製控制列 -->
    <div id="stageRecordBar" style="
        position:absolute; top:20px; right:76px; z-index:20;

        <button id="recordBtn" onclick="toggleRecording()" style="
            background:rgba(239,68,68,0.15); border:1px solid rgba(239,68,68,0.4);
            color:#fca5a5; border-radius:24px; padding:6px 16px;
            font-size:0.8rem; font-weight:700; cursor:pointer; display:flex; align-items:center; gap:6px;
            transition:all 0.2s; backdrop-filter:blur(6px); white-space:nowrap; letter-spacing:0.05em;
        " onmouseover="if(!_isRecording)this.style.background='rgba(239,68,68,0.28)'"
           onmouseout="if(!_isRecording)this.style.background='rgba(239,68,68,0.15)'">
            <span id="recordDot" style="width:8px;height:8px;border-radius:50%;background:#ef4444;display:inline-block;"></span>
            <span id="recordBtnLabel">開始錄製</span>

        <div id="recordTimer" style="

            display:none; font-variant-numeric:tabular-nums;

        ">00:00</div>
    </div>

    <!-- 關閉按鈕 -->
    <button onclick="closeVtuberStage()" style="
        position:absolute; top:20px; right:24px; z-index:20;
        background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.15);

        font-size:1.2rem; cursor:pointer; display:flex; align-items:center; justify-content:center;
        transition:background 0.2s; backdrop-filter:blur(6px);
    " onmouseover="this.style.background='rgba(255,255,255,0.18)'"
       onmouseout="this.style.background='rgba(255,255,255,0.08)'">✕</button>

    <!-- 標題 -->
    <div style="
        position:absolute; top:20px; left:50%; transform:translateX(-50%);
        font-family:'Noto Sans TC',sans-serif; font-size:0.8rem; letter-spacing:0.2em;
        color:rgba(255,255,255,0.3); z-index:20; white-space:nowrap;

<script>
    // ---------- 全域狀態 ----------
    let state = {
        characters: [],
        currentInterview: {
            title: '新訪談',
            topic: '燒仙草怎樣才比較好吃',
            dialogue: []
        },
        selectedCharacterId: null,
        editingDialogueIndex: null,
        speechQueue: [],         // 播放佇列
        isSpeaking: false,
        currentUtterance: null
    };

    // ---------- 初始化 & 語音引擎 ----------
    let cachedVoice = null;  // 預設中文語音

    function getChineseVoice() {
        if (cachedVoice) return cachedVoice;
        const voices = speechSynthesis.getVoices();
        // 優先找 zh-TW / zh-CN
        let selected = voices.find(v => v.lang === 'zh-TW') || voices.find(v => v.lang === 'zh-CN') || voices.find(v => v.lang.startsWith('zh'));
        if (!selected && voices.length) selected = voices[0];
        cachedVoice = selected;
        return cachedVoice;
    }

    // 確保語音清單載入後重新整理一次快取
    if (typeof speechSynthesis !== 'undefined') {
        speechSynthesis.onvoiceschanged = () => {
            cachedVoice = null;
            getChineseVoice();
        };
        setTimeout(() => { getChineseVoice(); }, 200);
    }

    // 停止所有語音並清空佇列
    function stopAllSpeech() {
        if (window.speechSynthesis) {
            window.speechSynthesis.cancel();
        }
        state.isSpeaking = false;
        state.speechQueue = [];
        if (state.currentUtterance) {
            try { state.currentUtterance.onend = null; } catch(e) {}
            state.currentUtterance = null;
        }
        updatePlayerStatus('已停止播放', false);
    }

    // 朗讀單句 (直接播放，不打斷? 為了體驗，會先停止目前再播)
    function speakText(text, rate = 1.0, pitch = 1.0) {
        return new Promise((resolve, reject) => {
            if (!text || text.trim() === '') {
                reject('無文字');
                return;
            }
            // 停止目前正在播放的，避免重疊
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = Math.min(2.0, Math.max(0.5, rate));
            utterance.pitch = Math.min(2.0, Math.max(0.5, pitch));
            utterance.lang = 'zh-TW';
            const voice = getChineseVoice();
            if (voice) utterance.voice = voice;
            utterance.onend = () => {
                resolve();
            };
            utterance.onerror = (err) => {
                console.warn('語音錯誤', err);
                reject(err);
            };
            state.currentUtterance = utterance;
            window.speechSynthesis.speak(utterance);
        });
    }

    // 朗讀特定對話索引 (使用角色配置的語速/音高)
    async function speakDialogueAtIndex(index) {
        if (!state.currentInterview.dialogue[index]) return false;
        const item = state.currentInterview.dialogue[index];
        const character = state.characters.find(c => c.id === item.characterId);
        if (!character) {
            showNotification(`找不到角色設定，使用預設語音`, 'warning');
            await speakText(item.text, 1.0, 1.0);
            return true;
        }
        const speed = character.voiceConfig?.speed ?? 1.0;
        const pitch = character.voiceConfig?.pitch ?? 1.0;
        await speakText(item.text, speed, pitch);
        return true;
    }

    // ══════════════════════════════════════════════════
    //  VTuber Stage Engine
    // ══════════════════════════════════════════════════

    let stageStarAnimId = null;

    function initStarCanvas() {
        const canvas = document.getElementById('stageStarCanvas');
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const stars = Array.from({length:180}, () => ({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            r: Math.random() * 1.5 + 0.3,
            sp: Math.random() * 0.4 + 0.1,
            a: Math.random()
        }));
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (const s of stars) {
                s.a += s.sp * 0.02;
                const alpha = (Math.sin(s.a) + 1) / 2 * 0.8 + 0.1;
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
                ctx.fillStyle = `rgba(200,210,255,${alpha})`;
                ctx.fill();
            }
            stageStarAnimId = requestAnimationFrame(draw);
        }
        draw();
    }

    function buildStageCharacters() {
        const container = document.getElementById('stageCharacters');
        container.innerHTML = '';
        const hostId  = document.getElementById('hostCharacter').value;
        const guestId = document.getElementById('guestCharacter').value;
        const characters = [
            state.characters.find(c => c.id === hostId),
            state.characters.find(c => c.id === guestId)
        ].filter(Boolean);

        characters.forEach((char, idx) => {
            const isGuest = char.role === 'guest';
            const roleClass = isGuest ? 'guest-char' : 'host-char';
            // flip guest to face left (towards host)
            const scaleX = isGuest ? -1 : 1;

            const wrap = document.createElement('div');
            wrap.className = `vtb-char-wrap dimmed ${roleClass}`;
            wrap.id = `vtb-wrap-${char.id}`;
            wrap.style.setProperty('--char-color', isGuest ? '#ec4899' : '#6366f1');

            const imgSrc = char.imageUrl || `https://api.dicebear.com/8.x/adventurer/svg?seed=${encodeURIComponent(char.name)}&size=300`;

            wrap.innerHTML = `
                <img src="${imgSrc}" class="vtb-char-img idle-anim"
                     id="vtb-img-${char.id}"
                     style="--sx:${scaleX}; transform:scaleX(${scaleX});"
                     onerror="this.src='https://api.dicebear.com/8.x/adventurer/svg?seed=${encodeURIComponent(char.name)}'">
                <div class="vtb-mouth-bar">
                    <span></span><span></span><span></span><span></span><span></span>
                </div>
                <div class="vtb-char-label">${char.name}</div>
            `;
            container.appendChild(wrap);
        });
    }

    function setActiveSpeaker(charId) {
        const allWraps = document.querySelectorAll('.vtb-char-wrap');
        allWraps.forEach(w => {
            const isActive = w.id === `vtb-wrap-${charId}`;
            w.classList.toggle('dimmed', !isActive);
            w.classList.toggle('speaking', isActive);
            const img = w.querySelector('.vtb-char-img');
            if (img) {
                img.classList.toggle('speaking-anim', isActive);
                img.classList.toggle('idle-anim', !isActive);
            }
        });
        // light colour
        const char = state.characters.find(c => c.id === charId);
        const isGuest = char?.role === 'guest';
        document.getElementById('stageLightHost').style.opacity  = isGuest ? '0.15' : '0.65';
        document.getElementById('stageLightGuest').style.opacity = isGuest ? '0.65' : '0.15';

        // subtitle colour
        const speaker = document.getElementById('stageSubtitleSpeaker');
        const textBox  = document.getElementById('stageSubtitleText');
        if (isGuest) {
            speaker.style.color = '#f9a8d4';
            speaker.style.textShadow = '0 0 20px rgba(249,168,212,0.9)';
            textBox.style.borderColor = 'rgba(236,72,153,0.4)';
        } else {
            speaker.style.color = '#a5b4fc';
            speaker.style.textShadow = '0 0 20px rgba(165,180,252,0.9)';
            textBox.style.borderColor = 'rgba(99,102,241,0.4)';
        }
    }

    function setSubtitle(speakerName, text, current, total) {
        const sp = document.getElementById('stageSubtitleSpeaker');
        const tx = document.getElementById('stageSubtitleText');
        const pg = document.getElementById('stageProgress');
        sp.textContent = `✦ ${speakerName} ✦`;
        tx.style.animation = 'none';
        tx.offsetHeight; // reflow
        tx.style.animation = 'vtb-subtitle-in 0.3s ease forwards';
        tx.textContent = text;
        pg.textContent = `${current} / ${total}`;
    }

    // ══════════════════════════════════════════════════
    //  背景管理
    // ══════════════════════════════════════════════════

    const BG_PRESETS = [
        { label:'客廳',  emoji:'🛋',  url:'https://images.unsplash.com/photo-1555041469-a586c61ea9bc?w=1920&q=85' },
        { label:'夜城',  emoji:'🌃',  url:'https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?w=1600&q=80' },
        { label:'書房',  emoji:'📚',  url:'https://images.unsplash.com/photo-1521587760476-6c12a4b040da?w=1600&q=80' },
        { label:'咖啡廳',emoji:'☕',  url:'https://images.unsplash.com/photo-1445116572660-236099ec97a0?w=1600&q=80' },
        { label:'星空',  emoji:'✨',  url:'__stars__' },
    ];

    let bgPickerCollapsed = false;

    function buildBgPresets() {
        const row = document.getElementById('bgPresetRow');
        if (!row) return;
        row.innerHTML = '';
        BG_PRESETS.forEach((p, i) => {
            const btn = document.createElement('button');
            btn.title = p.label;
            btn.innerHTML = `<span style="font-size:1.1rem">${p.emoji}</span><br><span style="font-size:0.6rem;color:#94a3b8">${p.label}</span>`;
            btn.style.cssText = `
                width:44px;height:48px;border-radius:8px;border:1px solid rgba(255,255,255,0.12);
                background:rgba(255,255,255,0.06);cursor:pointer;display:flex;flex-direction:column;
                align-items:center;justify-content:center;gap:1px;transition:all 0.2s;
                font-family:inherit;line-height:1;padding:2px;
            `;
            btn.id = `bgPreset_${i}`;
            btn.onmouseover = () => btn.style.background = 'rgba(99,102,241,0.3)';
            btn.onmouseout  = () => btn.style.background = btn._active ? 'rgba(99,102,241,0.4)' : 'rgba(255,255,255,0.06)';
            btn.onclick = () => applyBgPreset(p.url, i);
            row.appendChild(btn);
        });
        // 預設選中第一個
        applyBgPreset(BG_PRESETS[0].url, 0);
    }

    function applyBgPreset(url, activeIdx) {
        // 更新 active 樣式
        BG_PRESETS.forEach((_, i) => {
            const b = document.getElementById(`bgPreset_${i}`);
            if (!b) return;
            b._active = (i === activeIdx);
            b.style.background   = b._active ? 'rgba(99,102,241,0.4)' : 'rgba(255,255,255,0.06)';
            b.style.borderColor  = b._active ? 'rgba(99,102,241,0.7)' : 'rgba(255,255,255,0.12)';
        });
        if (url === '__stars__') {
            showStarsBg();
        } else {
            applyBgUrl(url);
        }
    }

    function applyBgUrl(url) {
        if (!url || !url.trim()) return;
        const layer = document.getElementById('stageBgLayer');
        const canvas = document.getElementById('stageStarCanvas');
        if (stageStarAnimId) { cancelAnimationFrame(stageStarAnimId); stageStarAnimId = null; }
        canvas.style.display = 'none';
        layer.style.backgroundImage = `url('${url.trim()}')`;
        layer.style.opacity = '1';
    }

    function applyBgFile(input) {
        const file = input.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = e => {
            // 清除預設 active 狀態
            BG_PRESETS.forEach((_, i) => {
                const b = document.getElementById(`bgPreset_${i}`);
                if (b) { b._active = false; b.style.background='rgba(255,255,255,0.06)'; b.style.borderColor='rgba(255,255,255,0.12)'; }
            });
            applyBgUrl(e.target.result);
        };
        reader.readAsDataURL(file);
    }

    function showStarsBg() {
        const layer  = document.getElementById('stageBgLayer');
        const canvas = document.getElementById('stageStarCanvas');
        layer.style.opacity = '0';
        canvas.style.display = 'block';
        initStarCanvas();
    }

    function toggleBgPicker() {
        bgPickerCollapsed = !bgPickerCollapsed;
        const picker = document.getElementById('stageBgPicker');
        const toggle = document.getElementById('bgPickerToggle');
        // 隱藏/顯示內容（保留標題行）
        const children = picker.querySelectorAll(':scope > *:not(:first-child):not(button#bgPickerToggle)');
        children.forEach(el => el.style.display = bgPickerCollapsed ? 'none' : '');
        toggle.textContent = bgPickerCollapsed ? '▼' : '▲';
        picker.style.minWidth = bgPickerCollapsed ? 'auto' : '220px';
    }

    function openVtuberStage() {
        const modal = document.getElementById('vtuberStageModal');
        modal.style.display = 'flex';
        buildStageCharacters();
        buildBgPresets();   // 初始化背景選擇器（含預設套用）
    }

    function closeVtuberStage() {
        const modal = document.getElementById('vtuberStageModal');
        modal.style.display = 'none';
        if (stageStarAnimId) { cancelAnimationFrame(stageStarAnimId); stageStarAnimId = null; }
        stopAllSpeech();
    }

    // 播放全部 (順序朗讀 + VTuber 舞台)
    async function playAllDialogue() {
        if (!state.currentInterview.dialogue.length) {
            showNotification('沒有對話可播放', 'error');
            return;
        }
        openVtuberStage();
        stopAllSpeech();
        await new Promise(r => setTimeout(r, 400)); // let stage render

        const total = state.currentInterview.dialogue.length;
        updatePlayerStatus(`🎧 開始播放全部 (0/${total})`, true);

        for (let i = 0; i < total; i++) {
            if (!state.isSpeaking && i > 0) break;
            state.isSpeaking = true;

            const item = state.currentInterview.dialogue[i];
            const character = state.characters.find(c => c.id === item.characterId);
            const charName = character ? character.name : item.characterName || '?';

            setActiveSpeaker(item.characterId);
            setSubtitle(charName, item.text, i + 1, total);
            updatePlayerStatus(`🔊 播放中: ${i+1}/${total} - ${charName}`, true);

            try {
                await speakDialogueAtIndex(i);
            } catch (err) {
                console.warn('播放單句失敗', err);
            }
            await new Promise(r => setTimeout(r, 180));
        }

        // 結束——兩人都亮
        document.querySelectorAll('.vtb-char-wrap').forEach(w => {
            w.classList.remove('dimmed','speaking');
            w.classList.add('speaking');
            const img = w.querySelector('.vtb-char-img');
            if(img){ img.classList.remove('speaking-anim'); img.classList.add('idle-anim'); }
        });
        document.getElementById('stageLightHost').style.opacity  = '0.4';
        document.getElementById('stageLightGuest').style.opacity = '0.4';
        document.getElementById('stageSubtitleSpeaker').textContent = '— 播放完畢 —';
        document.getElementById('stageSubtitleText').textContent = '感謝收看 ✨';
        document.getElementById('stageProgress').textContent = `${total} / ${total}`;

        state.isSpeaking = false;
        updatePlayerStatus('✅ 全部播放完畢', false);
    }

    // 朗讀全部對話 (類似播放全部但給獨立按鈕，行為一致)
    async function speakAllSequentially() {
        await playAllDialogue();
    }

    // 朗讀指定單句 (獨立按鈕)
    async function readSingleDialogue(index) {
        if (!state.currentInterview.dialogue[index]) return;
        stopAllSpeech();  // 中斷當下，立刻朗讀新句
        const item = state.currentInterview.dialogue[index];

    // AI 生成對話 (保留 AI 生成能力，優先 puter)
    
async function generateDialogue() {

    const topic = document.getElementById('interviewTopic').value.trim();

    const hostId = document.getElementById('hostCharacter').value;

    const guestId = document.getElementById('guestCharacter').value;

    if (!hostId || !guestId) {
        showNotification('請選擇主播與來賓', 'error');
        return;
    }

    const host = state.characters.find(c => c.id === hostId);
    const guest = state.characters.find(c => c.id === guestId);

    updatePlayerStatus('AI 生成中...', true);

    try {

        if (typeof puter === 'undefined') {
            throw new Error('Puter 未載入');
        }

        const prompt = `
請使用繁體中文。

主題：${topic}

主播：${host.name}
來賓：${guest.name}

請生成 30分鐘的自然訪談。

格式：

主播: 內容
來賓: 內容
`;

        let raw = '';

        const response = await puter.ai.chat(prompt, {
            model: 'gpt-4o-mini'
        });

        console.log(response);

        if (typeof response === 'string') {
            raw = response;
        }

        else if (response?.choices?.[0]?.message?.content) {
            raw = response.choices[0].message.content;
        }

        else if (response?.message?.content) {

            if (typeof response.message.content === 'string') {
                raw = response.message.content;
            }

            else if (Array.isArray(response.message.content)) {
                raw = response.message.content
                    .map(x => x.text || '')
                    .join('');
            }
        }

        else if (response?.text) {
            raw = response.text;
        }

        else if (Array.isArray(response?.content)) {
            raw = response.content
                .map(x => x.text || '')
                .join('');
        }

        if (!raw) {
            throw new Error('AI 無內容');
        }

        const lines = raw
            .split(/\r?\n/)
            .map(x => x.trim())
            .filter(x => x);

        const newDialogue = [];

        for (const line of lines) {

            if (line.startsWith('主播:')) {

                newDialogue.push({
                    characterId: host.id,
                    characterName: host.name,
                    text: line.replace('主播:', '').trim()
                });
            }

            else if (line.startsWith('來賓:')) {

                newDialogue.push({
                    characterId: guest.id,
                    characterName: guest.name,
                    text: line.replace('來賓:', '').trim()
                });
            }
        }

        if (newDialogue.length === 0) {
            throw new Error('解析失敗');
        }

        state.currentInterview.dialogue = newDialogue;

        renderDialogue();

        saveDataToStorage();

        updatePlayerStatus('AI 完成', false);

        showNotification('AI 對話生成成功', 'success');

    }

    catch (error) {

        console.error(error);

        showNotification('AI 生成失敗', 'error');

        updatePlayerStatus('AI 失敗', false);
    }
}

    // ══════════════════════════════════════════════════
    //  🎬 錄製引擎 (Screen Capture + MediaRecorder)
    // ══════════════════════════════════════════════════

    let _isRecording      = false;
    let _mediaRecorder    = null;
    let _recordedChunks   = [];
    let _recordTimerInt   = null;
    let _recordStartTime  = 0;
    let _recordStream     = null;
	let _audioCtx         = null;
	let _audioDest        = null;
	let _micStream        = null;
	let _mixedAudioStream = null;

    // 建立 AudioContext 並 patch SpeechSynthesis 輸出（透過系統音訊捕捉）
    async function _buildAudioCapture(displayStream) {

    try {

        _audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        // 最終混音輸出
        _audioDest = _audioCtx.createMediaStreamDestination();

        // ─────────────────────────────
        // 1. 分頁 / 系統音訊
        // ─────────────────────────────
        const displayAudioTracks = displayStream.getAudioTracks();

        if (displayAudioTracks.length > 0) {

            const displayAudioStream = new MediaStream(displayAudioTracks);

            const displaySource =
                _audioCtx.createMediaStreamSource(displayAudioStream);

            displaySource.connect(_audioDest);
        }

        // ─────────────────────────────
        // 2. 麥克風
        // ─────────────────────────────
        try {

            _micStream = await navigator.mediaDevices.getUserMedia({
                audio: {
                    echoCancellation: true,
                    noiseSuppression: true,
                    autoGainControl: true
                }
            });

            const micSource =
                _audioCtx.createMediaStreamSource(_micStream);

            const micGain = _audioCtx.createGain();

            micGain.gain.value = 1.2;

            micSource.connect(micGain);
            micGain.connect(_audioDest);

        } catch(err) {

            console.warn('麥克風取得失敗:', err);

            showNotification(
                '⚠️ 未授權麥克風，影片將只有系統聲音',
                'info'
            );
        }

        _mixedAudioStream = _audioDest.stream;

        return _mixedAudioStream;

    } catch(e) {

        console.error('Audio 混音建立失敗:', e);

        return null;
    }
}

    async function toggleRecording() {
        if (_isRecording) {
            await stopRecording();
        } else {
            await startRecording();
        }
    }

    async function startRecording() {

    const stage = document.getElementById('vtuberStageModal');

    if (!stage || stage.style.display === 'none') {

        showNotification('請先開啟 VTuber 舞台再錄製', 'error');

        return;
    }

    try {

        // ─────────────────────────────
        // 1. 擷取畫面
        // ─────────────────────────────
        const displayStream =
            await navigator.mediaDevices.getDisplayMedia({

                video: {
                    frameRate: 30,
                    cursor: 'never'
                },

                audio: true,

                preferCurrentTab: true
            });

        // ─────────────────────────────
        // 2. 建立混音
        // ─────────────────────────────
        const mixedAudio =
            await _buildAudioCapture(displayStream);

        // ─────────────────────────────
        // 3. 合併視訊 + 音訊
        // ─────────────────────────────
        const finalTracks = [

            ...displayStream.getVideoTracks()
        ];

        if (mixedAudio) {

            finalTracks.push(
                ...mixedAudio.getAudioTracks()
            );
        }

        const finalStream =
            new MediaStream(finalTracks);

        _recordStream = finalStream;

        _recordedChunks = [];

        // ─────────────────────────────
        // 4. MIME
        // ─────────────────────────────
        const mimeOptions = [

            'video/webm;codecs=vp9,opus',

            'video/webm;codecs=vp8,opus',

            'video/webm'
        ];

        const mimeType =
            mimeOptions.find(m =>
                MediaRecorder.isTypeSupported(m)
            ) || 'video/webm';

        // ─────────────────────────────
        // 5. Recorder
        // ─────────────────────────────
        _mediaRecorder = new MediaRecorder(
            finalStream,
            {
                mimeType,
                videoBitsPerSecond: 5_000_000,
                audioBitsPerSecond: 192_000
            }
        );

        _mediaRecorder.ondataavailable = e => {

            if (e.data.size > 0) {

                _recordedChunks.push(e.data);
            }
        };

        _mediaRecorder.onstop = () => {

            _finalizeRecording(mimeType);
        };

        _mediaRecorder.start(1000);

        _isRecording = true;

        // 使用者停止分享時
        displayStream.getVideoTracks()[0].onended = () => {

            if (_isRecording) {

                stopRecording();
            }
        };

        _updateRecordUI(true);

        _startTimer();

        showNotification(
            '🔴 已開始錄製（含麥克風 + 系統音訊）',
            'success'
        );

    } catch(err) {

        console.error(err);

        showNotification(
            '❌ 錄製啟動失敗: ' + err.message,
            'error'
        );

        _isRecording = false;
    }
}

    async function stopRecording() {
        if (!_mediaRecorder || _mediaRecorder.state === 'inactive') return;

        return new Promise(resolve => {
            _mediaRecorder.onstop = () => {
                _finalizeRecording(_mediaRecorder.mimeType);
                resolve();
            };
            _mediaRecorder.stop();
            if (_recordStream) {

    _recordStream.getTracks().forEach(t => t.stop());

    _recordStream = null;
}

if (_micStream) {

    _micStream.getTracks().forEach(t => t.stop());

    _micStream = null;
}

if (_audioCtx) {

    _audioCtx.close();

    _audioCtx = null;
}
            _isRecording = false;
            _stopTimer();
            _updateRecordUI(false);
        });
    }

    function _finalizeRecording(mimeType) {
        if (_recordedChunks.length === 0) {
            showNotification('❌ 錄製內容為空，請重試', 'error');
            return;
        }

        const isMP4 = mimeType.includes('mp4');
        const ext   = isMP4 ? 'mp4' : 'webm';
        const blob  = new Blob(_recordedChunks, { type: mimeType });

        const filename = `vtuber_stage_${new Date().toISOString().slice(0,19).replace(/[T:]/g,'-')}.${ext}`;
        const url = URL.createObjectURL(blob);
        const a   = document.createElement('a');
        a.href     = url;
        a.download = filename;
        a.click();

        setTimeout(() => URL.revokeObjectURL(url), 5000);
        _recordedChunks = [];

        const sizeMB = (blob.size / 1_048_576).toFixed(1);
        showNotification(`✅ 影片已下載！${filename}（${sizeMB} MB）`, 'success');
    }

    function _updateRecordUI(isActive) {
        const btn   = document.getElementById('recordBtn');
        const dot   = document.getElementById('recordDot');
        const label = document.getElementById('recordBtnLabel');
        const timer = document.getElementById('recordTimer');
        if (!btn) return;

        if (isActive) {
            btn.style.background   = 'rgba(239,68,68,0.5)';
            btn.style.borderColor  = 'rgba(239,68,68,0.9)';
            btn.style.color        = '#ffffff';
            dot.style.animation    = 'recDotBlink 1s ease-in-out infinite';
            label.textContent      = '停止錄製';
            timer.style.display    = 'block';
        } else {
            btn.style.background   = 'rgba(239,68,68,0.15)';
            btn.style.borderColor  = 'rgba(239,68,68,0.4)';
            btn.style.color        = '#fca5a5';
            dot.style.animation    = 'none';
            label.textContent      = '開始錄製';
            timer.style.display    = 'none';
            timer.textContent      = '00:00';
        }
    }

    function _startTimer() {
        _recordStartTime = Date.now();
        const timerEl = document.getElementById('recordTimer');
        _recordTimerInt = setInterval(() => {
            const elapsed = Math.floor((Date.now() - _recordStartTime) / 1000);
            const m = String(Math.floor(elapsed / 60)).padStart(2, '0');
            const s = String(elapsed % 60).padStart(2, '0');
            if (timerEl) timerEl.textContent = `${m}:${s}`;
        }, 1000);
    }

    function _stopTimer() {
        clearInterval(_recordTimerInt);
        _recordTimerInt = null;
    }

    // 自動停止錄製（若使用者直接關閉舞台）
    // 攔截原始 closeVtuberStage，在關閉前先停止錄製
    const _origClose = window.closeVtuberStage;
    window.closeVtuberStage = async function() {
        if (_isRecording) {
            await stopRecording();
        }
        _origClose();
    };

    // ── Puter 登入初始化 ─────────────────────────────────────
    async function initPuter() {
        const badge   = document.getElementById('puterBadge');
        const freeTag = document.getElementById('puterFreeTag');
        try {
            if (typeof puter === 'undefined') {
                badge.textContent = '載入失敗';
                badge.className = 'puter-badge warn';
                return;
            }
            // 使用 Promise.race 加入 3 秒 timeout，避免跨域 iframe 永久卡住
            const timeoutPromise = new Promise((_, reject) =>
                setTimeout(() => reject(new Error('timeout')), 3000)
            );
            let signedIn = false;
            try {
                signedIn = await Promise.race([
                    Promise.resolve(puter.auth.isSignedIn()),
                    timeoutPromise
                ]);
            } catch(e) { signedIn = false; }

            if (signedIn) {
                let user = null;
                try {
                    user = await Promise.race([
                        puter.auth.getUser(),
                        new Promise((_, r) => setTimeout(() => r(new Error('timeout')), 3000))
                    ]);
                } catch(e) {}
                badge.textContent = user?.username ? `✓ ${user.username}` : '✓ 已登入';
                badge.className = 'puter-badge ok';
                freeTag.textContent = '免費 AI · Puter 帳號';
            } else {
                badge.textContent = '✓ 就緒';
                badge.className = 'puter-badge ok';
                freeTag.textContent = '免費 AI · 點擊「生成對話」即可使用';
            }
        } catch(e) {
            badge.textContent = '✓ 就緒';
            badge.className = 'puter-badge ok';
        }
    }

    // 頁面載入後初始化 Puter 狀態（加入 SDK 載入等待）
    window.addEventListener('load', async () => {
        // 等待 puter SDK 完成初始化，最多重試 10 次（每次 500ms）
        let retries = 0;
        const waitForPuter = setInterval(() => {
            retries++;
            if (typeof puter !== 'undefined') {
                clearInterval(waitForPuter);
                setTimeout(() => {
                initPuter();
            }, 1500);
            } else if (retries >= 10) {
                clearInterval(waitForPuter);
                const badge = document.getElementById('puterBadge');
                if (badge) { badge.textContent = 'SDK 載入失敗'; badge.className = 'puter-badge warn'; }
            }
        }, 500);
    });
</script>
